- id: plugin.system
  kind: plugin
  layer: system
  name: Plugin System
  x:
    plugin:
      type: tool
      api: '1.0'
    impl:
      language: TypeScript
      complexity: complex
      status: stub
    docs:
      description: Plugin architecture for extending SketchCraft. Plugins are JavaScript/TypeScript modules loaded from a
        plugins directory.
      notes: "## Typed Interface\n\n```typescript\nimport { ITool, ToolContext } from '../types/tool';\nimport { Operation,\
        \ OperationParams, OperationResult } from '../types/operation';\nimport { ISceneManager, Entity } from '../data/scene';\n\
        import { ISelectionManager } from '../data/selection';\nimport { IMaterialManager, Material } from '../data/materials';\n\
        import { HalfEdgeMesh, Vertex, Edge, Face } from '../geometry/mesh';\n\n// ========== Plugin Manifest (manifest.json)\
        \ ==========\nexport interface PluginManifest {\n  id: string; // unique plugin ID: 'com.example.my-plugin'\n  name:\
        \ string;\n  version: string;\n  description: string;\n  author: string;\n  entry: string; // relative path to main\
        \ JS/TS file\n  permissions: PluginPermission[];\n  dependencies?: Record<string, string>; // other plugin IDs + versions\n\
        }\n\nexport type PluginPermission =\n  | 'scene:read' // read scene graph\n  | 'scene:write' // modify scene graph\n\
        \  | 'geometry:read' // read mesh data\n  | 'geometry:write' // modify mesh data\n  | 'materials:read'\n  | 'materials:write'\n\
        \  | 'ui:panel' // create UI panels\n  | 'ui:toolbar' // add toolbar buttons\n  | 'ui:menu' // add menu items\n  |\
        \ 'file:import' // register file importers\n  | 'file:export' // register file exporters\n  | 'filesystem:read' //\
        \ read files (sandboxed)\n  | 'filesystem:write'; // write files (sandboxed)\n\n// ========== Plugin API (provided\
        \ to plugins) ==========\nexport interface PluginAPI {\n  // Registration\n  registerTool(tool: ITool): void;\n  registerOperation(operation:\
        \ Operation): void;\n  registerFileImporter(format: string, importer: FileImporter): void;\n  registerFileExporter(format:\
        \ string, exporter: FileExporter): void;\n  registerPanel(panel: PanelDefinition): void;\n  registerMenuItem(menu:\
        \ string, item: MenuItemDefinition): void;\n\n  // Scene access (sandboxed)\n  readonly scene: Readonly<ISceneManager>;\
        \ // read-only unless scene:write permission\n  readonly selection: Readonly<ISelectionManager>;\n  readonly materials:\
        \ Readonly<IMaterialManager>;\n\n  // Geometry access (sandboxed)\n  getMesh(entityId: string): Readonly<HalfEdgeMesh>\
        \ | null;\n  modifyMesh(entityId: string, callback: (mesh: HalfEdgeMesh) => void): void; // wrapped in transaction\n\
        \n  // UI\n  showDialog(options: DialogOptions): Promise<DialogResult>;\n  showNotification(message: string, type:\
        \ 'info' | 'warning' | 'error'): void;\n  log(message: string, level?: 'debug' | 'info' | 'warn' | 'error'): void;\n\
        }\n\nexport interface FileImporter {\n  extensions: string[]; // ['.xyz', '.pts']\n  description: string;\n  import(data:\
        \ ArrayBuffer, options?: any): Promise<ImportResult>;\n}\n\nexport interface FileExporter {\n  extensions: string[];\n\
        \  description: string;\n  export(scene: ISceneManager, options?: any): Promise<ArrayBuffer>;\n}\n\nexport interface\
        \ ImportResult {\n  vertices: Float64Array;\n  faces: Uint32Array;\n  materials?: Material[];\n}\n\nexport interface\
        \ PanelDefinition {\n  id: string;\n  title: string;\n  icon: string;\n  position: 'left' | 'right' | 'bottom';\n\
        \  render: (container: HTMLElement) => void; // vanilla DOM rendering\n  dispose: () => void;\n}\n\nexport interface\
        \ MenuItemDefinition {\n  id: string;\n  label: string;\n  shortcut?: string;\n  onClick: () => void;\n}\n\n// ==========\
        \ Plugin Lifecycle ==========\nexport interface IPlugin {\n  activate(api: PluginAPI): void;\n  deactivate(): void;\n\
        }\n\n// ========== Plugin System (internal) ==========\nexport interface IPluginSystem {\n  loadPlugin(pluginPath:\
        \ string): Promise<void>;\n  unloadPlugin(pluginId: string): void;\n  getLoadedPlugins(): PluginManifest[];\n  isPluginLoaded(pluginId:\
        \ string): boolean;\n  getPluginAPI(pluginId: string): PluginAPI;\n  scanPluginDirectory(dirPath: string): Promise<PluginManifest[]>;\n\
        }\n```\n\n## Security Model\nPlugins run in the renderer process but with sandboxed API access:\n- Permissions declared\
        \ in manifest.json and approved by user on install\n- `scene:write` wraps all mutations in history transactions (undoable)\n\
        - `filesystem:*` access is sandboxed to plugin's own directory\n- No direct Node.js or Electron API access\n- Plugin\
        \ errors are caught and don't crash the host app"
  uuid: zlpTImRU
