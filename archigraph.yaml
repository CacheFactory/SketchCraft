- id: data.history
  kind: history
  layer: data
  name: Undo/Redo Manager
  x:
    history:
      maxSteps: 100
      persistent: false
    impl:
      language: TypeScript
      complexity: complex
      status: implemented
    docs:
      description: Command-pattern undo/redo system. Each user action is wrapped in a transaction that records the geometry
        state delta.
      notes: "## Typed Interface\n\n```typescript\nimport { MeshDelta } from '../geometry/mesh';\n\nexport interface Transaction\
        \ {\n  readonly id: string;\n  readonly name: string; // human-readable: 'Push/Pull', 'Move', 'Draw Line'\n  readonly\
        \ timestamp: number;\n  readonly deltas: Delta[]; // ordered list of changes\n}\n\nexport type Delta =\n  | { type:\
        \ 'mesh'; meshId: string; delta: MeshDelta }\n  | { type: 'entity-add'; entity: SerializedEntity }\n  | { type: 'entity-remove';\
        \ entity: SerializedEntity }\n  | { type: 'entity-change'; entityId: string; before: Partial<SerializedEntity>; after:\
        \ Partial<SerializedEntity> }\n  | { type: 'material-change'; materialId: string; before: MaterialState; after: MaterialState\
        \ }\n  | { type: 'selection-change'; before: string[]; after: string[] }\n  | { type: 'layer-change'; layerId: string;\
        \ before: LayerState; after: LayerState };\n\nexport interface IHistoryManager {\n  // Transaction lifecycle\n  beginTransaction(name:\
        \ string): Transaction;\n  commitTransaction(): void;\n  abortTransaction(): void; // rollback current transaction\n\
        \  isInTransaction(): boolean;\n\n  // Record changes (called during a transaction)\n  recordMeshDelta(meshId: string,\
        \ delta: MeshDelta): void;\n  recordEntityAdd(entity: SerializedEntity): void;\n  recordEntityRemove(entity: SerializedEntity):\
        \ void;\n  recordEntityChange(entityId: string, before: Partial<SerializedEntity>, after: Partial<SerializedEntity>):\
        \ void;\n\n  // Undo/Redo\n  undo(): Transaction | null; // returns undone transaction, null if nothing to undo\n\
        \  redo(): Transaction | null;\n  canUndo(): boolean;\n  canRedo(): boolean;\n  getUndoName(): string | null; // 'Undo\
        \ Push/Pull'\n  getRedoName(): string | null; // 'Redo Move'\n\n  // Stack inspection\n  getUndoStack(): ReadonlyArray<Transaction>;\n\
        \  getRedoStack(): ReadonlyArray<Transaction>;\n  getTransactionCount(): number;\n\n  // Configuration\n  setMaxSteps(max:\
        \ number): void;\n  clear(): void;\n\n  // Events\n  on(event: 'transaction-committed' | 'undo' | 'redo' | 'stack-changed',\
        \ handler: (t: Transaction) => void): void;\n  off(event: string, handler: Function): void;\n}\n```\n\n## Design Decisions\n\
        - **Delta-based, not snapshot-based**: Each transaction stores a minimal diff (MeshDelta), not a full model copy.\
        \ Memory-efficient for large models.\n- **Copy-on-write**: MeshDelta uses copy-on-write for vertex position arrays.\
        \ Only modified vertices are stored.\n- **Transaction grouping**: Complex operations (e.g., Follow Me creates many\
        \ edges) are wrapped in a single transaction so one Ctrl+Z undoes the whole thing.\n- **Redo invalidation**: Any new\
        \ action after undo clears the redo stack.\n- **Max steps**: Default 100 transactions. Oldest transactions are discarded\
        \ when limit reached."
  uuid: sF6Q1SXe
