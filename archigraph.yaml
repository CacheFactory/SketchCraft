- id: renderer.webgl
  kind: renderer
  layer: rendering
  name: WebGL Renderer
  x:
    renderer:
      engine: Three.js
      antialiasing: MSAA
      shadows: true
      postProcessing: SSAO, edge detection outlines, selection highlight glow
    perf:
      critical: true
      optimizations: Frustum culling, instanced rendering for components, LOD for distant objects, GPU picking for selection,
        batched geometry for draw call reduction
      benchmarks: Target 60fps for models up to 500K faces, 30fps for models up to 2M faces
    impl:
      language: TypeScript
      framework: Three.js
      complexity: very-complex
      status: implemented
    docs:
      description: "Three.js WebGL renderer with ambient+directional+hemisphere lighting.\n          Infinite shader-based\
        \ ground grid. Selection highlight swaps face materials (polygonOffset -1)\n          and edge materials (glow tube\
        \ cylinder for visible thickness). Pre-selection uses orange,\n          selection uses blue. Edge lines in overlay\
        \ scene (separate render pass after depth clear).\n          Raycasts both main scene (faces) and overlay scene (edges).\
        \ Edge hit threshold scales\n          with camera distance (2% of distance). Edges prioritized over faces in raycast\
        \ results."
      notes: "## Typed Interface\n\n```typescript\nimport * as THREE from 'three';\nimport { EffectComposer } from 'three/examples/jsm/postprocessing/EffectComposer';\n\
        import { HalfEdgeMesh, GPUBufferData } from '../geometry/mesh';\nimport { ISceneManager, Group, ComponentInstance\
        \ } from '../data/scene';\nimport { ISelectionManager } from '../data/selection';\nimport { IMaterialManager, Material\
        \ } from '../data/materials';\nimport { InferenceGuide } from '../geometry/inference';\nimport { Camera } from '../rendering/camera';\n\
        \nexport type RenderMode = 'wireframe' | 'shaded' | 'textured' | 'rendered' | 'xray';\n\nexport interface RenderStats\
        \ {\n  fps: number;\n  frameTime: number; // ms\n  drawCalls: number;\n  triangles: number;\n  geometryMemory: number;\
        \ // bytes\n  textureMemory: number; // bytes\n}\n\nexport interface RenderOverlay {\n  inferenceGuides: InferenceGuide[];\n\
        \  selectionHighlights: string[]; // entity IDs\n  preselectionHighlight: string | null;\n  rubberBandGeometry: THREE.BufferGeometry\
        \ | null; // tool preview lines\n  gridVisible: boolean;\n  axesVisible: boolean;\n  sectionPlanes: SectionPlaneData[];\n\
        }\n\nexport interface SectionPlaneData {\n  plane: THREE.Plane;\n  active: boolean;\n  showFill: boolean;\n}\n\nexport\
        \ interface IRenderer {\n  // Setup\n  initialize(canvas: HTMLCanvasElement, width: number, height: number): void;\n\
        \  dispose(): void;\n  resize(width: number, height: number): void;\n\n  // Render loop\n  startRenderLoop(): void;\n\
        \  stopRenderLoop(): void;\n  requestFrame(): void; // force re-render\n  render(camera: Camera, overlay: RenderOverlay):\
        \ void;\n\n  // Scene sync\n  syncScene(sceneManager: ISceneManager): void; // rebuild Three.js scene from scene graph\n\
        \  syncMesh(meshId: string, mesh: HalfEdgeMesh): void; // update single mesh\n  syncMaterial(material: Material):\
        \ void; // update single material\n  syncSelection(selectionManager: ISelectionManager): void;\n\n  // Render mode\n\
        \  setRenderMode(mode: RenderMode): void;\n  getRenderMode(): RenderMode;\n\n  // Picking (GPU-accelerated)\n  pick(screenX:\
        \ number, screenY: number): PickResult | null;\n  pickRect(x1: number, y1: number, x2: number, y2: number): PickResult[];\n\
        \n  // Stats\n  getStats(): RenderStats;\n\n  // Configuration\n  setShadowsEnabled(enabled: boolean): void;\n  setAntialiasing(mode:\
        \ 'none' | 'FXAA' | 'MSAA' | 'SMAA'): void;\n  setBackgroundMode(mode: 'solid' | 'gradient' | 'environment'): void;\n\
        \  setEdgeRendering(enabled: boolean, color?: string, width?: number): void;\n}\n\nexport interface PickResult {\n\
        \  entityId: string;\n  entityType: 'vertex' | 'edge' | 'face' | 'group' | 'component_instance';\n  point: THREE.Vector3;\
        \ // world-space intersection point\n  normal: THREE.Vector3; // face normal at hit point\n  distance: number; //\
        \ camera distance\n  faceId?: string;\n  edgeId?: string;\n  vertexId?: string;\n}\n```\n\n## Render Pipeline (per\
        \ frame)\n1. Sync dirty geometry (check HalfEdgeMesh dirty flags → update THREE.BufferGeometry)\n2. Sync dirty materials\
        \ (check Material dirty flags → update THREE.MeshStandardMaterial)\n3. Depth pre-pass (for SSAO)\n4. Main color pass\
        \ (PBR materials via shader.pbr)\n5. Edge/outline pass (shader.outline — Sobel edge detection)\n6. Selection highlight\
        \ pass (shader.selection — stencil-based)\n7. SSAO pass\n8. Overlay pass (grid, axes, inference guides, rubber-band\
        \ lines, dimensions)\n9. Present to canvas\n\n## Instanced Rendering\nComponent instances that share a definition\
        \ use THREE.InstancedMesh. One draw call for all instances of the same component, with per-instance transform matrices."
  uuid: uJZVdiUn
