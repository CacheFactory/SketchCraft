            select(entity: SelectableEntity): void; // replace selection
            add(entity: SelectableEntity): void; // add to selection
            remove(entity: SelectableEntity): void; // remove from selection
            toggle(entity: SelectableEntity): void; // toggle in/out
            selectAll(): void; // select all in current editing context
            clear(): void;
            selectConnected(entity: SelectableEntity): void; // select all connected geometry

