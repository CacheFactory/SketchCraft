    docs:
      description: Web Worker for file import/export operations. Parses incoming file data into geometry structures.
      notes: "## Typed Interface\n\n```typescript\nimport { TransferableMesh } from './mesh-worker';\n\n/** Messages: main\
        \ thread → worker */\nexport type FileIORequest =\n  | { type: 'import'; id: string; format: 'obj' | 'stl' | 'gltf'\
        \ | 'dxf' | 'fbx' | 'step'; data: ArrayBuffer; options?: any }\n  | { type: 'export'; id: string; format: 'obj' |\
        \ 'stl' | 'gltf' | 'dxf' | 'fbx'; mesh: TransferableMesh; materials?: SerializedMaterial[]; options?: any };\n\n/**\
        \ Messages: worker → main thread */\nexport type FileIOResponse =\n  | { type: 'import-result'; id: string; result:\
        \ ImportedScene }\n  | { type: 'export-result'; id: string; data: ArrayBuffer }\n  | { type: 'progress'; id: string;\
        \ percent: number; message: string }\n  | { type: 'error'; id: string; error: string };\n\nexport interface ImportedScene\
        \ {\n  meshes: ImportedMesh[];\n  materials: SerializedMaterial[];\n  hierarchy: SceneNode[];\n}\n\nexport interface\
        \ ImportedMesh {\n  name: string;\n  positions: Float64Array;\n  indices: Uint32Array;\n  normals?: Float32Array;\n\
        \  uvs?: Float32Array;\n  materialIndex: number;\n}\n\nexport interface SerializedMaterial {\n  name: string;\n  albedoColor:\
        \ [number, number, number];\n  roughness: number;\n  metalness: number;\n  opacity: number;\n  albedoTextureData?:\
        \ ArrayBuffer; // embedded texture\n  albedoTextureFormat?: 'png' | 'jpg';\n}\n\nexport interface SceneNode {\n  name:\
        \ string;\n  meshIndices: number[];\n  transform: number[]; // 4x4 matrix as 16 floats\n  children: SceneNode[];\n\
        }\n\n// ========== Main thread wrapper ==========\n\nexport class FileIOWorkerClient {\n  private worker: Worker;\n\
        \  private pending: Map<string, { resolve: Function; reject: Function }>;\n\n  importFile(format: string, data: ArrayBuffer,\
        \ options?: any, onProgress?: (p: number) => void): Promise<ImportedScene>;\n  exportFile(format: string, mesh: TransferableMesh,\
        \ materials?: SerializedMaterial[], options?: any, onProgress?: (p: number) => void): Promise<ArrayBuffer>;\n  terminate():\
        \ void;\n}\n```\n\n## Format-Specific Notes\n- **OBJ**: Pure JS parser. Handles v/vn/vt/f lines, material .mtl references.\n\
        - **STL**: Binary header check (80 bytes), then triangle loop. Very simple.\n- **glTF**: Use Three.js GLTFLoader adapted\
        \ for worker (no DOM). Parse JSON + binary buffers.\n- **DXF**: Parse ASCII DXF entities (LINE, 3DFACE, CIRCLE, ARC,\
        \ POLYLINE, BLOCK).\n- **FBX**: Use fbx-parser library for binary FBX decoding.\n- **STEP**: Load OpenCascade WASM\
        \ on demand. Heavy — show progress bar."
  uuid: t7DdLeOV
