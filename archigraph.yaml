  - id: data.history
    kind: history
    layer: data
    name: Undo/Redo Manager
    x:
      history:
        maxSteps: 100
        persistent: false
      impl:
        language: TypeScript
        complexity: complex
      docs:
        description: >-
          Command-pattern undo/redo system. Each user action is wrapped in a transaction that records the geometry state
          delta.
        notes: >-
          ## Typed Interface


          ```typescript

          import { MeshDelta } from '../geometry/mesh';


          export interface Transaction {
            readonly id: string;
            readonly name: string; // human-readable: 'Push/Pull', 'Move', 'Draw Line'
            readonly timestamp: number;
            readonly deltas: Delta[]; // ordered list of changes
          }


          export type Delta =
            | { type: 'mesh'; meshId: string; delta: MeshDelta }
            | { type: 'entity-add'; entity: SerializedEntity }
            | { type: 'entity-remove'; entity: SerializedEntity }
            | { type: 'entity-change'; entityId: string; before: Partial<SerializedEntity>; after: Partial<SerializedEntity> }
            | { type: 'material-change'; materialId: string; before: MaterialState; after: MaterialState }
            | { type: 'selection-change'; before: string[]; after: string[] }
            | { type: 'layer-change'; layerId: string; before: LayerState; after: LayerState };

          export interface IHistoryManager {
            // Transaction lifecycle
            beginTransaction(name: string): Transaction;
            commitTransaction(): void;
            abortTransaction(): void; // rollback current transaction
            isInTransaction(): boolean;

            // Record changes (called during a transaction)
            recordMeshDelta(meshId: string, delta: MeshDelta): void;
            recordEntityAdd(entity: SerializedEntity): void;
            recordEntityRemove(entity: SerializedEntity): void;
            recordEntityChange(entityId: string, before: Partial<SerializedEntity>, after: Partial<SerializedEntity>): void;

            // Undo/Redo
            undo(): Transaction | null; // returns undone transaction, null if nothing to undo
            redo(): Transaction | null;
            canUndo(): boolean;
            canRedo(): boolean;
            getUndoName(): string | null; // 'Undo Push/Pull'
            getRedoName(): string | null; // 'Redo Move'

            // Stack inspection
            getUndoStack(): ReadonlyArray<Transaction>;
            getRedoStack(): ReadonlyArray<Transaction>;
            getTransactionCount(): number;

            // Configuration
            setMaxSteps(max: number): void;
            clear(): void;

            // Events
            on(event: 'transaction-committed' | 'undo' | 'redo' | 'stack-changed', handler: (t: Transaction) => void): void;
            off(event: string, handler: Function): void;
          }

          ```


          ## Design Decisions

          - **Delta-based, not snapshot-based**: Each transaction stores a minimal diff (MeshDelta), not a full model
          copy. Memory-efficient for large models.

          - **Copy-on-write**: MeshDelta uses copy-on-write for vertex position arrays. Only modified vertices are
          stored.

          - **Transaction grouping**: Complex operations (e.g., Follow Me creates many edges) are wrapped in a single
          transaction so one Ctrl+Z undoes the whole thing.

          - **Redo invalidation**: Any new action after undo clears the redo stack.

          - **Max steps**: Default 100 transactions. Oldest transactions are discarded when limit reached.
    uuid: sF6Q1SXe
