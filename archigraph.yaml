            getSelectedByType<T extends SelectableEntity>(type: EntityType): T[];
            getSelectedFaces(): Face[];
            getSelectedEdges(): Edge[];
            getSelectedVertices(): Vertex[];

            // Pre-selection (hover)
            setPreselection(entity: SelectableEntity | null): void;
            getPreselection(): SelectableEntity | null;

