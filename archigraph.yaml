  - id: data.document
    kind: scene_manager
    layer: data
    name: Model Document
    x:
      scene:
        hierarchy: tree
        layers: true
        groups: true
      impl:
        language: TypeScript
        complexity: complex
      docs:
        description: >-
          The in-memory model document — the single source of truth for an open project. Owns and coordinates all model
          state.
        notes: >-
          ## Typed Interface


          ```typescript

          import { ISceneManager, ScenePage, Layer } from '../data/scene';

          import { ISelectionManager } from '../data/selection';

          import { IHistoryManager } from '../data/history';

          import { IMaterialManager, Material } from '../data/materials';

          import { HalfEdgeMesh } from '../geometry/mesh';

          import { Vector3 } from '../math/types';


          export type LengthUnit = 'mm' | 'cm' | 'm' | 'inches' | 'feet';


          export interface DocumentMetadata {
            name: string;
            description: string;
            author: string;
            createdAt: number;
            modifiedAt: number;
            units: LengthUnit;
            geoLocation?: { latitude: number; longitude: number; northAngle: number };
          }


          export interface DocumentState {
            dirty: boolean; // has unsaved changes
            filePath: string | null; // null = never saved
            autoSaveEnabled: boolean;
            autoSaveIntervalMs: number;
            lastAutoSave: number | null;
          }


          export interface IModelDocument {
            // Sub-managers (owned)
            readonly scene: ISceneManager;
            readonly selection: ISelectionManager;
            readonly history: IHistoryManager;
            readonly materials: IMaterialManager;

            // Document state
            readonly metadata: DocumentMetadata;
            readonly state: DocumentState;

            // Lifecycle
            static createNew(template?: string): IModelDocument;
            static openFromFile(filePath: string, data: ArrayBuffer): Promise<IModelDocument>;
            save(): Promise<ArrayBuffer>; // serialize to native format
            saveAs(filePath: string): Promise<void>;
            close(): void; // cleanup, release resources

            // Metadata
            setUnits(units: LengthUnit): void;
            getUnits(): LengthUnit;
            setMetadata(partial: Partial<DocumentMetadata>): void;

            // Dirty tracking
            isDirty(): boolean;
            markClean(): void; // after successful save

            // Auto-save
            getAutoSaveData(): ArrayBuffer; // serialize for temp file
            hasAutoSaveRecovery(filePath: string): boolean;
            recoverAutoSave(filePath: string): Promise<IModelDocument>;

            // Import/Export (delegates to file_format nodes)
            importFile(format: string, data: ArrayBuffer, options?: any): Promise<void>;
            exportFile(format: string, options?: any): Promise<ArrayBuffer>;

            // Events
            on(event: 'dirty-changed' | 'saved' | 'units-changed' | 'metadata-changed', handler: (data: any) => void): void;
            off(event: string, handler: Function): void;
          }

          ```


          ## Document Ownership

          The document is the root owner of all model state:

          - `document.scene` → SceneManager (groups, layers, pages)

          - `document.selection` → SelectionManager

          - `document.history` → HistoryManager

          - `document.materials` → MaterialManager

          - Scene graph nodes own their `HalfEdgeMesh` instances


          ## Auto-Save

          Every `autoSaveIntervalMs` (default 5 min), serialize the document to a temp file in `app.getPath('temp')`. On
          crash recovery, check for temp files newer than the last save.
    uuid: LDuh74wJ
