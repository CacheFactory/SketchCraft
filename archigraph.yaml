  - id: bridge.scene
    kind: service
    layer: runtime
    name: Scene Bridge
    x:
      impl:
        language: TypeScript
        framework: Three.js
        complexity: moderate
      docs:
        description: >-
          Synchronizes the geometry engine's B-Rep data (vertices, edges, faces) with Three.js scene objects for rendering.
          Each face becomes a THREE.Group with front (DoubleSide MeshStandardMaterial) + back meshes in the main scene.
          Each edge becomes a THREE.Line in the OVERLAY scene (rendered in a separate pass after depth clear, so edges
          always draw on top of faces regardless of highlight state). Edge materials are shared and never swapped by the
          highlight system. Preview lines and snap markers are non-raycastable (raycast=()=>{}). Hosts vertex/midpoint
          snap detection by projecting all vertices to screen space on each mouse move (draw tools only).
    uuid: sBr1dg3X
  - id: app.singleton
    kind: service
    layer: runtime
    name: Application Singleton
    x:
      impl:
        language: TypeScript
        complexity: complex
      docs:
        description: >-
          Main application orchestrator instantiated by ViewportCanvas on mount. Bootstraps and owns all subsystems:
          ModelDocument (geometry engine + scene + selection + history + materials), Viewport (Three.js renderer + camera),
          InferenceEngine, ToolManager (registers all 23 tools), and SceneBridge. Provides syncScene() to push geometry
          changes to the renderer after tool operations. Handles IPC menu actions (new/open/save/undo/redo/delete).
          Exposes activateTool/getActiveTool/getAvailableTools for the UI layer.
          Also provides syncSelection() which pushes selection state to both the Three.js renderer
          (for visual highlights) and the React UI (Entity Info panel, selection count badge).
    uuid: aS1ngl3T
  - id: system.snap
    kind: service
    layer: interaction
    name: Snap System
    x:
      impl:
        language: TypeScript
        complexity: moderate
      docs:
        description: >-
          Vertex/midpoint snap detection integrated into SceneBridge. On every mouse move during drawing tools,
          projects all existing vertices to screen space and finds the nearest one within 15px. Returns the
          snapped 3D world point so drawing tools can connect to existing geometry. Renders a green ring+dot
          marker at snap points (non-raycastable overlay). Falls back to showing a blue cursor dot when not
          snapped. Only active for draw-category tools; disabled for select and navigate tools.
    uuid: sSnpSys1
  - id: system.autoface
    kind: service
    layer: geometry
    name: Auto-Face Creation
    x:
      impl:
        language: TypeScript
        complexity: moderate
      docs:
        description: >-
          Three auto-face mechanisms in GeometryEngine:
          (1) autoCreateFaces via createEdgeWithAutoFace(): BFS finds shortest closed coplanar loop (3-12
          vertices) through existing edges when a new edge is created. Returns full loop including target
          vertex. Used by Line tool.
          (2) splitFaceWithEdge via createEdgeWithAutoFace(): when BOTH endpoints are on the same face
          boundary (non-adjacent), splits the face into two along the new edge. Runs before autoCreateFaces.
          (3) splitFaceWithPath(): splits a face along a multi-vertex path (e.g., arc). Handles endpoints
          that lie ON face edges (not just at corners) by detecting proximity to edge line segments (0.05
          tolerance), inserting the vertex into the face boundary, and splitting the underlying edge. Both
          resulting faces include the arc vertices along their shared boundary (no chord edge created).
          Used by Arc tool and Line tool on deactivate. Rectangle/Circle/Polygon use plain createEdge().
          File I/O uses OBJ format for save/open.
    uuid: sAutFce1
  - id: system.undo
    kind: service
    layer: data
    name: Snapshot Undo/Redo
    x:
      impl:
        language: TypeScript
        complexity: moderate
      docs:
        description: >-
          Snapshot-based undo/redo system. Each tool transaction serializes the full geometry engine state
          (binary ArrayBuffer) before and after the operation. Undo restores the "before" snapshot via
          geometry.deserialize(). Redo restores the "after" snapshot. The HistoryManager stores up to 100
          snapshots. Callbacks are wired by ModelDocument via setSnapshotCallbacks(). Critical: newDocument()
          calls history.clear() instead of creating a new HistoryManager, preserving the callbacks.
    uuid: sUndoSys
  - id: system.keyboard
    kind: service
    layer: interaction
    name: Keyboard Event Router
    x:
      impl:
        language: TypeScript
        complexity: moderate
      docs:
        description: >-
          ALL keyboard events are handled by a single window-level listener in App.tsx. No onKeyDown on the
          viewport container (removed to prevent double-firing). The handler routes: (1) Cmd/Ctrl+Z → undo,
          Cmd/Ctrl+Shift+Z → redo, (2) single-letter keys → tool activation via activateTool(), (3) arrow
          keys → forwarded to active tool's onKeyDown for plane switching, (4) Escape/Enter/Delete →
          forwarded to active tool. Arrow keys bypass the INPUT focus check so they work even when the VCB
          has focus. Electron menu items have NO accelerators — all shortcuts go through this handler to
          avoid the native menu intercepting key events before they reach the renderer.
    uuid: sKbdRout
  - id: system.components
    kind: service
    layer: data
    name: Component System
    x:
      impl:
        language: TypeScript
        complexity: moderate
      docs:
        description: >-
          Groups of face/edge IDs that act as a single unit in SceneManager. Components protect their
          internal geometry from main-scene editing. Key methods: createComponent(name, entityIds),
          explodeComponent(id), enterComponent(id), exitComponent(). isEntityProtected(id) returns true
          if the entity is in a component NOT currently being edited. isEntityEditable(id) returns true
          for entities in the active component (edit mode) or not in any component (main scene).
          When a component is selected, the hitEntityId is replaced with the component ID in the raycast
          pipeline. Application.syncSelection() resolves component IDs to member IDs for visual highlighting.
          SceneBridge renders purple wireframe bounding boxes around components. Move/Rotate/Scale tools
          resolve component IDs to member vertices via BaseTool.resolveSelectedEntityIds(). Entity Info
          panel shows component name, entity count, and Edit/Explode buttons.
    uuid: sCompSys
  - id: system.layers
    kind: service
    layer: data
    name: Layer System
    x:
      impl:
        language: TypeScript
        complexity: moderate
      docs:
        description: >-
          Layer management in SceneManager. Each layer has visibility, locked, and color properties.
          Active layer (activeLayerId) determines where new geometry is assigned. SceneBridge auto-assigns
          new faces/edges to active layer via geometryLayerMap. Layer visibility hides Three.js objects
          (face groups and edge lines set visible=false). Layer locking prevents selection (raycast
          pipeline filters via isEntityLocked). Layers panel supports: create, delete, toggle visibility,
          toggle lock, set active, assign selected entities to layer.
    uuid: sLayrSys
  - id: system.fileio
