      status: implemented
    docs:
      description: 'Groups of face/edge IDs that act as a single unit in SceneManager. Components protect their internal geometry
        from main-scene editing. Key methods: createComponent(name, entityIds), explodeComponent(id), enterComponent(id),
        exitComponent(). isEntityProtected(id) returns true if the entity is in a component NOT currently being edited. isEntityEditable(id)
        returns true for entities in the active component (edit mode) or not in any component (main scene). When a component
        is selected, the hitEntityId is replaced with the component ID in the raycast pipeline. Application.syncSelection()
        resolves component IDs to member IDs for visual highlighting. SceneBridge renders purple wireframe bounding boxes
        around components. Move/Rotate/Scale tools resolve component IDs to member vertices via BaseTool.resolveSelectedEntityIds().
        Entity Info panel shows component name, entity count, and Edit/Explode buttons.'
  uuid: sCompSys
- id: system.layers
  kind: service
  layer: data
  name: Layer System
  x:
    impl:
      language: TypeScript
      complexity: moderate
      status: implemented
    docs:
      description: 'Layer management in SceneManager. Each layer has visibility, locked, and color properties. Active layer
        (activeLayerId) determines where new geometry is assigned. SceneBridge auto-assigns new faces/edges to active layer
        via geometryLayerMap. Layer visibility hides Three.js objects (face groups and edge lines set visible=false). Layer
        locking prevents selection (raycast pipeline filters via isEntityLocked). Layers panel supports: create, delete, toggle
        visibility, toggle lock, set active, assign selected entities to layer.'
  uuid: sLayrSys
- id: system.fileio
  kind: service
  layer: data
  name: OBJ File I/O
  x:
    impl:
      language: TypeScript
      complexity: simple
      status: implemented
    docs:
      description: "OBJ text format save/open in Application. exportOBJ() writes vertices (v),\n          faces (f), and edges\
        \ (l). importOBJ() parses and creates geometry. Toolbar buttons\n          (\U0001F4C4\U0001F4C2\U0001F4BE) and shortcuts\
        \ (Cmd+N/O/S/Shift+S). Uses Electron IPC for native file dialogs."
  uuid: sFileIO1
- id: system.dragselect
  kind: service
  layer: interaction
  name: Drag Box Selection
  x:
    impl:
      language: TypeScript
      complexity: simple
      status: implemented
    docs:
      description: Drag-to-select in SelectTool. Left-to-right drag shows blue solid box (window mode), right-to-left shows
        green dashed box (crossing mode). Projects face centers and edge midpoints to screen space and checks containment
        within the box. Visual overlay rendered as an HTML div in ViewportCanvas. Cursor changes to pointer when hovering
        over selectable entities.
  uuid: sDrgSel1
