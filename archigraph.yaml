views:
  - name: User Workflow
    description: End-to-end view from actor through UI to geometry
    include:
      nodes:
        - actor.designer
        - window.main
        - toolbar.main
        - toolbar.drawing
        - tool.select
        - tool.line
        - tool.pushpull
        - tool.move
        - viewport.main
        - renderer.webgl
        - camera.main
        - op.extrude
        - engine.geometry
        - mesh.halfedge
        - data.scene
        - data.selection
    id: view.user_workflow
  - name: Rendering Pipeline
    description: 3D rendering stack from viewport to shaders
    include:
      nodes:
        - viewport.main
        - renderer.webgl
        - camera.main
        - shader.pbr
        - shader.outline
        - shader.selection
        - shader.xray
        - mesh.halfedge
        - lib.threejs
    id: view.rendering_pipeline
  - name: Modeling Operations
    description: All modeling operations and their geometry targets
    include:
      nodes:
        - op.extrude
        - op.sweep
        - op.offset
        - op.boolean_union
        - op.boolean_subtract
        - op.boolean_intersect
        - op.intersect_faces
        - op.subdivide
        - op.triangulate
        - mod.array
        - mod.mirror
        - mod.smooth
        - engine.geometry
        - mesh.halfedge
        - solid.manifold
    id: view.modeling_operations
  - name: Electron Architecture
    description: System-level process architecture and IPC
    include:
      nodes:
        - process.main
        - process.renderer
        - worker.mesh
        - worker.fileio
        - native.manifold
        - lib.electron
        - lib.threejs
        - lib.react
        - lib.manifold_wasm
    id: view.electron_architecture
  - name: File I/O
    description: File format support and data flow
    include:
      nodes:
        - file.native
        - file.obj
        - file.stl
        - file.gltf
        - file.dxf
        - file.step
        - datastore.filesystem
        - datastore.preferences
        - worker.fileio
        - data.scene
    id: view.file_i_o
  - name: Tools & Inference
    description: Drawing tools and inference engine constraints
    include:
      nodes:
        - tool.line
        - tool.rectangle
        - tool.circle
        - tool.arc
        - tool.pushpull
        - tool.move
        - tool.rotate
        - tool.offset
        - constraint.on_axis
        - constraint.parallel
        - constraint.perpendicular
        - constraint.snap_point
        - constraint.distance
    id: view.tools_inference
rules: []
