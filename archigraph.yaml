  - id: op.extrude
    kind: operation
    layer: modeling
    name: Extrude (Push/Pull)
    x:
      operation:
        type: extrude
        destructive: true
        preview: true
      perf:
        critical: true
      impl:
        language: TypeScript
        complexity: very-complex
      docs:
        description: >-
          Core push/pull extrusion operation — the heart of SketchUp modeling. Takes a planar face and a distance,
          creates new side faces connecting the original boundary to a translated copy.
        notes: |-
          ## Typed Interface

          ```typescript
          import { Operation, OperationParams, OperationResult } from '../types/operation';
          import { Face, Edge, Vertex, HalfEdgeMesh } from '../geometry/mesh';
          import { Vector3 } from '../math/types';
          import { SolidEngine } from '../geometry/solid';

          export interface ExtrudeParams extends OperationParams {
            face: Face; // the face to extrude
            distance: number; // positive = along normal, negative = against
            direction?: Vector3; // override face normal
            createNewStartFace: boolean; // Ctrl mode: leave original face behind
            autoBooleanCut: boolean; // detect and perform boolean subtraction
          }

          export interface ExtrudeResult extends OperationResult {
            newFaces: Face[]; // all newly created faces (sides + cap)
            capFace: Face; // the translated copy of the original face
            sideFaces: Face[]; // faces connecting original boundary to cap
            newEdges: Edge[];
            newVertices: Vertex[];
            removedFaces: Face[]; // faces consumed by boolean cut
            wasBooleanCut: boolean;
          }

          export interface ExtrudeDelta {
            // For undo system — minimal diff to reverse this operation
            addedVertices: { id: string; position: Vector3 }[];
            addedEdges: { id: string; v1: string; v2: string }[];
            addedFaces: { id: string; loop: string[] }[];
            removedFaces: { id: string; loop: string[]; material: string }[];
            movedVertices: { id: string; from: Vector3; to: Vector3 }[];
          }

          export class ExtrudeOperation implements Operation {
            readonly id = 'op.extrude';
            readonly type = 'extrude';
            readonly destructive = true;

            execute(mesh: HalfEdgeMesh, params: ExtrudeParams): ExtrudeResult;
            preview(mesh: HalfEdgeMesh, params: ExtrudeParams): ExtrudeResult; // non-destructive preview
            undo(mesh: HalfEdgeMesh, delta: ExtrudeDelta): void;
            redo(mesh: HalfEdgeMesh, delta: ExtrudeDelta): void;

            // Internal
            private createSideFaces(boundary: Edge[], normal: Vector3, distance: number): Face[];
            private cloneAndTranslateFace(face: Face, offset: Vector3): Face;
            private mergeCoplanarFaces(mesh: HalfEdgeMesh, newFaces: Face[]): void;
            private detectBooleanCutNeeded(face: Face, direction: Vector3, distance: number, mesh: HalfEdgeMesh): boolean;
            private performBooleanCut(face: Face, distance: number, solid: SolidEngine): ExtrudeResult;
          }
          ```

          ## Algorithm Detail
          1. Get ordered boundary edges of face: `face.getOuterLoop()` → `HalfEdge[]`
          2. For each boundary vertex, create a new vertex at `vertex.position + normal * distance`
          3. For each boundary edge (v1→v2), create a quad side face: (v1, v2, v2_new, v1_new)
          4. Create cap face from all new vertices in same winding order as original
          5. Update half-edge connectivity: side face half-edges link to cap and original
          6. If `createNewStartFace`: keep original face, else original face becomes part of the solid
          7. Run `mergeCoplanarFaces` to clean up coplanar adjacencies
          8. Return delta for undo system
        references: https://help.sketchup.com/en/sketchup/push-pulling-shapes
      references: https://help.sketchup.com/en/sketchup/push-pulling-shapes
    uuid: Pkot4oID
