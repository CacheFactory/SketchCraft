      notes: "## Typed Interface\n\n```typescript\nimport { test, expect, ElectronApplication, Page } from '@playwright/test';\n\
        \n// ========== Test Helpers ==========\n\nexport interface ViewportHelper {\n  // Mouse interactions on the 3D viewport\
        \ canvas\n  clickAt(x: number, y: number): Promise<void>;\n  doubleClickAt(x: number, y: number): Promise<void>;\n\
        \  dragFrom(x1: number, y1: number, x2: number, y2: number): Promise<void>;\n  scrollAt(x: number, y: number, delta:\
        \ number): Promise<void>;\n  middleDragFrom(x1: number, y1: number, x2: number, y2: number): Promise<void>;\n\n  //\
        \ Tool activation\n  activateTool(toolId: string): Promise<void>;\n  pressShortcut(key: string): Promise<void>;\n\
        \  typeVCB(value: string): Promise<void>;\n\n  // Geometry assertions (via IPC to renderer)\n  getVertexCount(): Promise<number>;\n\
        \  getFaceCount(): Promise<number>;\n  getEdgeCount(): Promise<number>;\n  getEntityCount(type: string): Promise<number>;\n\
        \  getSelectionCount(): Promise<number>;\n  getSelectedIds(): Promise<string[]>;\n  getMeshBoundingBox(): Promise<{\
        \ min: number[]; max: number[] }>;\n}\n\nexport interface AppHelper {\n  electronApp: ElectronApplication;\n  page:\
        \ Page;\n  viewport: ViewportHelper;\n\n  // Setup\n  launch(): Promise<void>;\n  close(): Promise<void>;\n  newDocument():\
        \ Promise<void>;\n  loadFixture(name: string): Promise<void>;\n\n  // Assertions\n  expectToolActive(toolId: string):\
        \ Promise<void>;\n  expectUndoAvailable(available: boolean): Promise<void>;\n  expectRedoAvailable(available: boolean):\
        \ Promise<void>;\n  expectDirty(dirty: boolean): Promise<void>;\n}\n```\n\n## Test Scenarios\n\n### Drawing Tool Tests\n\
        ```typescript\ntest.describe('Line Tool', () => {\n  test('draw a single line', async ({ app }) => {\n    await app.viewport.activateTool('tool.line');\n\
        \    await app.viewport.clickAt(400, 300); // start point\n    await app.viewport.clickAt(600, 300); // end point\n\
        \    await app.viewport.pressShortcut('Escape'); // finish\n    expect(await app.viewport.getEdgeCount()).toBe(1);\n\
        \    expect(await app.viewport.getVertexCount()).toBe(2);\n  });\n\n  test('draw rectangle creates face', async ({\
        \ app }) => {\n    // draw 4 lines forming closed loop\n    await app.viewport.activateTool('tool.line');\n    await\
        \ app.viewport.clickAt(300, 300);\n    await app.viewport.clickAt(500, 300);\n    await app.viewport.clickAt(500,\
        \ 500);\n    await app.viewport.clickAt(300, 500);\n    await app.viewport.clickAt(300, 300); // close loop\n    expect(await\
        \ app.viewport.getFaceCount()).toBe(1);\n  });\n\n  test('VCB input sets exact length', async ({ app }) => {\n   \
        \ await app.viewport.activateTool('tool.line');\n    await app.viewport.clickAt(400, 300);\n    await app.viewport.typeVCB('1000');\
        \ // 1000mm\n    // verify edge length matches\n  });\n\n  test('undo removes last edge', async ({ app }) => {\n \
        \   await app.viewport.activateTool('tool.line');\n    await app.viewport.clickAt(400, 300);\n    await app.viewport.clickAt(600,\
        \ 300);\n    await app.viewport.pressShortcut('Escape');\n    expect(await app.viewport.getEdgeCount()).toBe(1);\n\
        \    await app.viewport.pressShortcut('Control+z');\n    expect(await app.viewport.getEdgeCount()).toBe(0);\n  });\n\
        });\n```\n\n### Push/Pull Tests\n```typescript\ntest.describe('Push/Pull Tool', () => {\n  test('extrude face creates\
        \ solid', async ({ app }) => {\n    await app.loadFixture('unit-rectangle'); // flat rectangle face\n    await app.viewport.activateTool('tool.pushpull');\n\
        \    await app.viewport.clickAt(400, 350); // click face\n    await app.viewport.dragFrom(400, 350, 400, 200); //\
        \ drag up\n    expect(await app.viewport.getFaceCount()).toBe(6); // box = 6 faces\n  });\n\n  test('double-click\
        \ repeats last distance', async ({ app }) => {\n    await app.loadFixture('two-rectangles');\n    await app.viewport.activateTool('tool.pushpull');\n\
        \    // extrude first face\n    await app.viewport.clickAt(300, 350);\n    await app.viewport.typeVCB('500');\n  \
        \  // double-click second face\n    await app.viewport.doubleClickAt(500, 350);\n    // both should be extruded by\
        \ 500\n  });\n\n  test('VCB input sets exact extrude distance', async ({ app }) => {\n    await app.loadFixture('unit-rectangle');\n\
        \    await app.viewport.activateTool('tool.pushpull');\n    await app.viewport.clickAt(400, 350);\n    await app.viewport.typeVCB('250');\n\
        \    const bbox = await app.viewport.getMeshBoundingBox();\n    expect(bbox.max[2] - bbox.min[2]).toBeCloseTo(250,\
        \ 0);\n  });\n});\n```\n\n### Selection Tests\n```typescript\ntest.describe('Select Tool', () => {\n  test('click\
        \ selects entity', async ({ app }) => {\n    await app.loadFixture('cube');\n    await app.viewport.activateTool('tool.select');\n\
        \    await app.viewport.clickAt(400, 300); // click face\n    expect(await app.viewport.getSelectionCount()).toBe(1);\n\
        \  });\n\n  test('click empty space deselects', async ({ app }) => {\n    await app.loadFixture('cube');\n    await\
        \ app.viewport.activateTool('tool.select');\n    await app.viewport.clickAt(400, 300);\n    await app.viewport.clickAt(50,\
        \ 50); // empty space\n    expect(await app.viewport.getSelectionCount()).toBe(0);\n  });\n\n  test('shift-click toggles\
