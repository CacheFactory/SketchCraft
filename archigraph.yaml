            });

            test('box select (window) selects entities inside', async ({ app }) => {
              await app.loadFixture('scattered-cubes');
              await app.viewport.activateTool('tool.select');
              await app.viewport.dragFrom(200, 200, 600, 600); // left-to-right = window
              // only fully-inside entities selected
            });

            test('box select (crossing) selects intersecting entities', async ({ app }) => {
              await app.loadFixture('scattered-cubes');
              await app.viewport.activateTool('tool.select');
              await app.viewport.dragFrom(600, 200, 200, 600); // right-to-left = crossing
              // entities intersecting or inside selected
            });
          });
          ```

          ### Navigation Tests
          ```typescript
          test.describe('Camera Navigation', () => {
            test('middle mouse drag orbits', async ({ app }) => {
              await app.loadFixture('cube');
