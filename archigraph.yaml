- id: process.main
  kind: main_process
  layer: system
  name: Electron Main Process
  x:
    electron:
      processType: main
    impl:
      language: TypeScript
      framework: Electron
      complexity: complex
      status: implemented
    docs:
      description: Electron main process — the Node.js backend of the application.
      notes: "## Typed Interface\n\n```typescript\nimport { app, BrowserWindow, ipcMain, dialog, Menu } from 'electron';\n\
        \n// ========== IPC Channel Contracts ==========\n\n/** Channels: renderer → main (invoke/send) */\nexport interface\
        \ MainProcessAPI {\n  // File operations\n  'file:open': () => Promise<{ filePath: string; data: ArrayBuffer } | null>;\n\
        \  'file:save': (args: { filePath: string; data: ArrayBuffer }) => Promise<boolean>;\n  'file:save-as': (args: { data:\
        \ ArrayBuffer; defaultName: string }) => Promise<{ filePath: string } | null>;\n  'file:export': (args: { data: ArrayBuffer;\
        \ format: string; defaultName: string }) => Promise<{ filePath: string } | null>;\n  'file:import': (args: { formats:\
        \ string[] }) => Promise<{ filePath: string; data: ArrayBuffer; format: string } | null>;\n  'file:read': (args: {\
        \ filePath: string }) => Promise<ArrayBuffer>;\n  'file:write': (args: { filePath: string; data: ArrayBuffer }) =>\
        \ Promise<boolean>;\n  'file:get-recent': () => Promise<string[]>;\n  'file:add-recent': (args: { filePath: string\
        \ }) => Promise<void>;\n\n  // Preferences\n  'prefs:get': () => Promise<UserPreferences>;\n  'prefs:set': (args:\
        \ Partial<UserPreferences>) => Promise<void>;\n\n  // Native modules\n  'native:boolean': (args: { op: 'union' | 'subtract'\
        \ | 'intersect'; meshA: ArrayBuffer; meshB: ArrayBuffer }) => Promise<ArrayBuffer>;\n  'native:step-import': (args:\
        \ { data: ArrayBuffer }) => Promise<ArrayBuffer>;\n\n  // App\n  'app:get-version': () => Promise<string>;\n  'app:get-user-data-path':\
        \ () => Promise<string>;\n  'app:quit': () => Promise<void>;\n}\n\n/** Channels: main → renderer (send) */\nexport\
        \ interface RendererEvents {\n  'menu:action': { action: MenuAction };\n  'file:auto-save-tick': {};\n  'app:before-quit':\
        \ {};\n}\n\nexport type MenuAction =\n  | 'new' | 'open' | 'save' | 'save-as'\n  | 'undo' | 'redo'\n  | 'cut' | 'copy'\
        \ | 'paste' | 'delete' | 'select-all'\n  | 'zoom-extents' | 'zoom-window'\n  | 'preferences' | 'about';\n\nexport\
        \ interface UserPreferences {\n  units: 'mm' | 'cm' | 'm' | 'inches' | 'feet';\n  gridSpacing: number;\n  snapEnabled:\
        \ boolean;\n  autoSaveInterval: number; // ms\n  theme: 'light' | 'dark';\n  shortcuts: Record<string, string>;\n\
        \  recentFiles: string[];\n  defaultTemplate: string;\n  renderQuality: 'low' | 'medium' | 'high';\n}\n```\n\n## Preload\
        \ Script\nUses `contextBridge.exposeInMainWorld()` to expose a typed `window.api` object:\n```typescript\n// preload.ts\n\
        contextBridge.exposeInMainWorld('api', {\n  invoke: <K extends keyof MainProcessAPI>(channel: K, ...args: Parameters<MainProcessAPI[K]>)\
        \ =>\n    ipcRenderer.invoke(channel, ...args),\n  on: <K extends keyof RendererEvents>(channel: K, handler: (data:\
        \ RendererEvents[K]) => void) =>\n    ipcRenderer.on(channel, (_, data) => handler(data)),\n});\n```\n\n## Security\n\
        - `contextIsolation: true` — renderer cannot access Node.js directly\n- `nodeIntegration: false` — no `require()`\
        \ in renderer\n- All file system access goes through IPC\n- Native modules loaded only in main process"
  uuid: ZOA1mLbr
- id: process.renderer
  kind: renderer_process
  layer: system
  name: Main Renderer Process
  x:
    electron:
      processType: renderer
      devTools: true
    impl:
      language: TypeScript
      framework: React
      complexity: complex
