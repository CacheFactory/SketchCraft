        description: Manages the hierarchical scene graph. Root contains loose geometry, groups, and component instances.
        notes: >-
          ## Typed Interface


          ```typescript

          import { HalfEdgeMesh } from '../geometry/mesh';

          import { Matrix4, Vector3 } from '../math/types';

          import { Material } from '../data/materials';


          // ========== Scene Graph Types ==========


          export type EntityType = 'vertex' | 'edge' | 'face' | 'group' | 'component_instance' | 'component_definition'
          | 'guide_line' | 'guide_point' | 'dimension' | 'text' | 'section_plane' | 'image';


          export interface Entity {
            readonly id: string;
            readonly type: EntityType;
            name: string;
            layer: Layer;
            visible: boolean;
            locked: boolean;
            parentGroup: Group | null;
          }


          export interface Group extends Entity {
            type: 'group';
            transform: Matrix4; // local-to-parent transform
            mesh: HalfEdgeMesh; // geometry in local coords
            children: Entity[]; // nested groups/instances
          }


          export interface ComponentDefinition {
            readonly id: string;
            name: string;
            description: string;
            mesh: HalfEdgeMesh; // prototype geometry
            instances: ComponentInstance[];
            thumbnail: ImageBitmap | null;
          }


          export interface ComponentInstance extends Entity {
            type: 'component_instance';
            definition: ComponentDefinition;
            transform: Matrix4; // local-to-parent transform
            // geometry comes from definition.mesh — all instances share it
          }


          export interface Layer {
            readonly id: string;
            name: string;
            visible: boolean;
            locked: boolean;
            color: string; // for color-by-layer mode
            isDefault: boolean;
          }


          export interface ScenePage {
            readonly id: string;
            name: string;
            cameraPosition: Vector3;
            cameraTarget: Vector3;
            cameraFov: number;
            cameraProjection: 'perspective' | 'orthographic';
            layerVisibility: Map<string, boolean>;
            activeSectionPlanes: string[];
            renderMode: string;
          }


          export interface EditingContext {
            path: Group[]; // stack of groups we've entered
            currentGroup: Group | null; // null = editing root
            activeEntities: Set<string>; // IDs of entities in current context (editable)
          }


          // ========== Scene Manager API ==========


          export interface ISceneManager {
            // Scene graph
            readonly root: Group; // root group containing all top-level entities
            readonly editingContext: EditingContext;

            // Entity management
            addEntity(entity: Entity, parent?: Group): void;
            removeEntity(entity: Entity): void;
            moveEntity(entity: Entity, newParent: Group): void;
            getEntity(id: string): Entity | undefined;
            getAllEntities(): Entity[];
            findEntitiesByType(type: EntityType): Entity[];

            // Groups
            createGroup(entities: Entity[]): Group;
            explodeGroup(group: Group): Entity[];
            enterEditingContext(group: Group): void;
            exitEditingContext(): void;

            // Components
            createComponentDefinition(group: Group, name: string): ComponentDefinition;
            placeComponentInstance(definition: ComponentDefinition, transform: Matrix4): ComponentInstance;
            makeUnique(instance: ComponentInstance): ComponentDefinition;

            // Layers
            createLayer(name: string): Layer;
            deleteLayer(layer: Layer): void;
            assignLayer(entity: Entity, layer: Layer): void;
            getActiveLayer(): Layer;
            setActiveLayer(layer: Layer): void;
            getLayers(): Layer[];

            // Scene Pages
            createPage(name: string): ScenePage;
            deletePage(page: ScenePage): void;
            activatePage(page: ScenePage): void;
            getPages(): ScenePage[];

            // Events
            on(event: 'entity-added' | 'entity-removed' | 'entity-changed' | 'layer-changed' | 'context-changed', handler: (data: any) => void): void;
            off(event: string, handler: Function): void;
          }

          ```


          ## Editing Context

          When the user double-clicks a group/component, we "enter" it — only its entities are editable, everything else
