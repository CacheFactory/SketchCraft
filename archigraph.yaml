    docs:
      description: Manages material definitions and texture assets. Stores PBR material properties.
      notes: "## Typed Interface\n\n```typescript\nimport { Color3, Vector2 } from '../math/types';\n\nexport interface TextureMap\
        \ {\n  filePath: string; // relative path to texture file\n  width: number;\n  height: number;\n  scale: Vector2;\
        \ // UV scale (tiling)\n  offset: Vector2; // UV offset\n  rotation: number; // UV rotation in radians\n  gpuTexture:\
        \ WebGLTexture | null; // cached GPU handle\n  imageData: ImageBitmap | null; // cached CPU image\n}\n\nexport interface\
        \ Material {\n  readonly id: string;\n  name: string;\n  // PBR properties\n  albedoColor: Color3; // base color (RGB\
        \ 0-1)\n  albedoTexture: TextureMap | null;\n  roughness: number; // 0 (mirror) to 1 (matte)\n  roughnessTexture:\
        \ TextureMap | null;\n  metalness: number; // 0 (dielectric) to 1 (metal)\n  metalnessTexture: TextureMap | null;\n\
        \  normalTexture: TextureMap | null;\n  opacity: number; // 0 (transparent) to 1 (opaque)\n  opacityTexture: TextureMap\
        \ | null;\n  // SketchUp-style\n  colorized: boolean; // tint texture with albedoColor\n  thumbnail: ImageBitmap |\
        \ null;\n}\n\nexport interface MaterialLibrary {\n  readonly id: string;\n  name: string;\n  materials: Material[];\n\
        \  filePath: string; // JSON file on disk\n}\n\nexport interface IMaterialManager {\n  // Material CRUD\n  createMaterial(name:\
        \ string, props?: Partial<Material>): Material;\n  deleteMaterial(material: Material): void;\n  updateMaterial(material:\
        \ Material, changes: Partial<Material>): void;\n  getMaterial(id: string): Material | undefined;\n  getAllMaterials():\
        \ Material[];\n  getDefaultMaterial(): Material; // white, no texture\n\n  // Texture loading\n  loadTexture(filePath:\
        \ string): Promise<TextureMap>;\n  unloadTexture(texture: TextureMap): void;\n\n  // Libraries\n  loadLibrary(filePath:\
        \ string): Promise<MaterialLibrary>;\n  saveLibrary(library: MaterialLibrary): Promise<void>;\n  getBuiltInLibraries():\
        \ MaterialLibrary[]; // wood, metal, glass, etc.\n\n  // Face assignment\n  assignToFace(face: Face, material: Material,\
        \ backMaterial?: Material): void;\n  sampleFromFace(face: Face): Material;\n  replaceAll(oldMaterial: Material, newMaterial:\
        \ Material): number; // returns count\n\n  // GPU sync\n  getThreeMaterial(material: Material): THREE.MeshStandardMaterial;\n\
        \  invalidateGPUMaterial(material: Material): void;\n\n  // Events\n  on(event: 'material-created' | 'material-changed'\
        \ | 'material-deleted' | 'library-loaded', handler: (data: any) => void): void;\n  off(event: string, handler: Function):\
        \ void;\n}\n```\n\n## Built-in Libraries\nShip with default material libraries: Colors (basic colors), Wood (oak,\
        \ pine, walnut), Metal (steel, aluminum, copper), Glass (clear, tinted, frosted), Concrete, Brick, Stone, Fabric.\
        \ Each library is a JSON file with embedded texture file references."
