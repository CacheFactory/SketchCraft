- id: engine.inference
  kind: geometry_engine
  layer: geometry
  name: Inference Engine
  x:
    geometry:
      precision: float64
      representation: B-Rep
    perf:
      critical: true
      optimizations: Spatial indexing for nearest-point queries, cached edge/face geometry for snap computation, frame-rate
        throttled inference updates
      benchmarks: Snap computation < 2ms per frame for models up to 100K edges
    impl:
      language: TypeScript
      complexity: very-complex
      status: implemented
    docs:
      description: Centralized inference engine — the core of SketchUp-style guided drawing. Runs every frame during tool
        operations to find snap targets and constraint guides.
      notes: "## Typed Interface\n\n```typescript\nimport { Vector3, Ray, Plane } from '../math/types';\nimport { Vertex,\
        \ Edge, Face } from '../geometry/mesh';\nimport { IGeometryEngine } from '../geometry/engine';\n\nexport type InferenceType\
        \ =\n  | 'endpoint' // green dot — vertex snap\n  | 'midpoint' // cyan dot — edge midpoint\n  | 'on-edge' // red dot\
        \ — point on edge\n  | 'on-face' // blue dot — point on face\n  | 'intersection' // black dot — edge-edge or edge-axis\
        \ intersection\n  | 'on-axis-x' // red line — constrained to X axis\n  | 'on-axis-y' // green line — constrained to\
        \ Y axis\n  | 'on-axis-z' // blue line — constrained to Z axis\n  | 'parallel' // magenta line — parallel to referenced\
        \ edge\n  | 'perpendicular' // magenta line — perpendicular to referenced edge\n  | 'from-point' // dotted line —\
        \ inference from a previously referenced point\n  | 'tangent'; // tangent to arc/circle\n\nexport interface InferenceResult\
        \ {\n  type: InferenceType;\n  point: Vector3; // the snapped-to 3D point\n  priority: number; // higher = stronger\
        \ snap (endpoint > on-edge > on-face)\n  referenceEntity: Vertex | Edge | Face | null; // what we snapped to\n  guideGeometry:\
        \ InferenceGuide[]; // visual guides to draw\n  tooltip: string; // 'Endpoint', 'On Edge', 'Midpoint', etc.\n  color:\
        \ string; // guide color (#FF0000 for X axis, etc.)\n}\n\nexport interface InferenceGuide {\n  type: 'point' | 'line'\
        \ | 'dashed-line' | 'arc';\n  points: Vector3[]; // [center] for point, [start, end] for line\n  color: string;\n\
        \  size: number; // dot size or line width in pixels\n}\n\nexport interface InferenceContext {\n  toolStartPoint:\
        \ Vector3 | null; // where the current tool operation started\n  recentPoints: Vector3[]; // recently clicked/referenced\
        \ points (for from-point inference)\n  recentEdges: Edge[]; // recently referenced edges (for parallel/perpendicular)\n\
        \  lockedAxis: 'x' | 'y' | 'z' | null; // arrow key axis lock\n  lockedPlane: Plane | null; // face plane lock\n \
        \ customAxes: { origin: Vector3; xAxis: Vector3; yAxis: Vector3; zAxis: Vector3 } | null;\n}\n\nexport interface InferenceConfig\
        \ {\n  snapRadius: number; // screen pixels — default 15\n  axisSnapAngle: number; // degrees deviation to snap to\
        \ axis — default 5\n  pointPriority: number; // endpoint/midpoint priority — default 100\n  edgePriority: number;\
        \ // on-edge priority — default 50\n  facePriority: number; // on-face priority — default 10\n  axisPriority: number;\
        \ // axis constraint priority — default 75\n  enabled: boolean;\n}\n\nexport interface IInferenceEngine {\n  // Main\
        \ query — called every frame during tool operation\n  findInference(\n    screenPos: { x: number; y: number },\n \
        \   ray: Ray, // 3D ray from camera through screen point\n    context: InferenceContext,\n    config?: Partial<InferenceConfig>\n\
        \  ): InferenceResult | null;\n\n  // Batch query — find all inferences sorted by priority\n  findAllInferences(\n\
        \    screenPos: { x: number; y: number },\n    ray: Ray,\n    context: InferenceContext\n  ): InferenceResult[];\n\
        \n  // Specific snap tests\n  snapToPoint(ray: Ray, candidates: Vertex[], screenRadius: number): InferenceResult |\
        \ null;\n  snapToEdge(ray: Ray, candidates: Edge[], screenRadius: number): InferenceResult | null;\n  snapToFace(ray:\
        \ Ray, candidates: Face[]): InferenceResult | null;\n  snapToAxis(point: Vector3, origin: Vector3, axes: Vector3[]):\
        \ InferenceResult | null;\n  snapToParallel(point: Vector3, direction: Vector3, referenceEdge: Edge): InferenceResult\
        \ | null;\n  snapToPerpendicular(point: Vector3, direction: Vector3, referenceEdge: Edge): InferenceResult | null;\n\
        \n  // Configuration\n  setConfig(config: Partial<InferenceConfig>): void;\n  getConfig(): InferenceConfig;\n}\n```\n\
        \n## Inference Pipeline (per frame)\n1. Cast ray from camera through cursor position\n2. Spatial query: get all vertices/edges/faces\
        \ within snap radius (screen space)\n3. Test point snaps: endpoint, midpoint, intersection (highest priority)\n4.\
        \ Test edge snaps: on-edge, perpendicular, parallel\n5. Test face snaps: on-face\n6. Test axis constraints: X/Y/Z\
        \ axis from start point\n7. Test from-point inferences: lines from recently referenced points\n8. Rank all results\
        \ by priority + distance\n9. Return best result + guide geometry for rendering\n\n## Performance Budget\nMust complete\
        \ in < 2ms per frame for models up to 100K edges. Uses spatial index (octree) for candidate collection. Caches screen-space\
        \ projections of nearby geometry."
      references: https://help.sketchup.com/en/sketchup/using-inference-system
  uuid: Eqy9cs0S
- id: test.e2e.tools
