- id: engine.geometry
  kind: geometry_engine
  layer: geometry
  name: Core Geometry Engine
  x:
    geometry:
      precision: float64
      representation: B-Rep
    solid:
      kernel: Custom
    perf:
      critical: true
      optimizations: Spatial indexing (octree) for ray intersection, edge hash map for fast topology queries, lazy face triangulation,
        incremental validation
      benchmarks: Face creation < 1ms, edge split < 0.5ms, face-face intersection < 5ms per pair
    impl:
      language: TypeScript
      complexity: very-complex
      status: implemented
    docs:
      description: "B-Rep geometry kernel with half-edge mesh. Auto-face finds ALL coplanar\n          loops (not just shortest).\
        \ Coplanarity tolerance 0.05. splitFaceWithPath handles edge-point\n          insertion. Guards: no self-edges, no\
        \ zero-length edges, degenerate face prevention.\n          Serialization for undo/redo snapshots."
      notes: "## Typed Interface\n\n```typescript\nimport { Vector3, Matrix4, Plane, BoundingBox } from '../math/types';\n\
        \n// ========== Core Geometry Types ==========\n\nexport interface GeometryId {\n  readonly id: string; // unique\
        \ stable ID (UUID)\n}\n\nexport interface Vertex extends GeometryId {\n  position: Vector3; // float64\n  edges: HalfEdge[];\
        \ // outgoing half-edges (circular linked)\n  selected: boolean;\n  hidden: boolean;\n}\n\nexport interface HalfEdge\
        \ extends GeometryId {\n  origin: Vertex; // start vertex\n  twin: HalfEdge; // opposite direction half-edge\n  next:\
        \ HalfEdge; // next half-edge in face loop\n  prev: HalfEdge; // previous half-edge in face loop\n  face: Face | null;\
        \ // face this half-edge bounds (null = boundary)\n  edge: Edge; // parent edge\n}\n\nexport interface Edge extends\
        \ GeometryId {\n  halfEdge: HalfEdge; // one of the two half-edges\n  soft: boolean; // softened (hidden but still\
        \ exists)\n  smooth: boolean; // smooth normals across this edge\n  selected: boolean;\n  hidden: boolean;\n  materialIndex:\
        \ number;\n}\n\nexport interface Face extends GeometryId {\n  outerLoop: HalfEdge; // first half-edge of outer boundary\n\
        \  innerLoops: HalfEdge[]; // first half-edge of each hole\n  normal: Vector3; // face normal (computed, cached)\n\
        \  plane: Plane; // face plane equation\n  materialIndex: number; // front material\n  backMaterialIndex: number;\
        \ // back material\n  selected: boolean;\n  hidden: boolean;\n  area: number; // cached, invalidated on change\n}\n\
        \nexport interface Loop {\n  firstHalfEdge: HalfEdge;\n  vertices(): IterableIterator<Vertex>;\n  edges(): IterableIterator<Edge>;\n\
        \  halfEdges(): IterableIterator<HalfEdge>;\n  length(): number; // number of edges in loop\n  isClosed(): boolean;\n\
        }\n\n// ========== Geometry Engine API ==========\n\nexport interface IGeometryEngine {\n  // Vertex operations\n\
        \  createVertex(position: Vector3): Vertex;\n  moveVertex(vertex: Vertex, newPosition: Vector3): void;\n  mergeVertices(v1:\
        \ Vertex, v2: Vertex, tolerance?: number): Vertex;\n  deleteVertex(vertex: Vertex): void;\n\n  // Edge operations\n\
        \  createEdge(v1: Vertex, v2: Vertex): Edge;\n  splitEdge(edge: Edge, point: Vector3): { edge1: Edge; edge2: Edge;\
        \ vertex: Vertex };\n  collapseEdge(edge: Edge): Vertex;\n  deleteEdge(edge: Edge): void;\n\n  // Face operations\n\
        \  createFace(vertices: Vertex[]): Face; // creates edges + face from ordered vertex loop\n  createFaceFromEdges(edges:\
        \ Edge[]): Face | null; // detect closed coplanar loop\n  deleteFace(face: Face): void;\n  splitFace(face: Face, v1:\
        \ Vertex, v2: Vertex): { face1: Face; face2: Face; edge: Edge };\n  triangulateFace(face: Face): Face[];\n\n  // Topology\
        \ queries\n  getAdjacentFaces(face: Face): Face[];\n  getVertexFaces(vertex: Vertex): Face[];\n  getEdgeFaces(edge:\
        \ Edge): [Face | null, Face | null];\n  getConnectedComponent(entity: Vertex | Edge | Face): Set<Face>;\n  isManifold(faces:\
        \ Face[]): boolean;\n  isWatertight(faces: Face[]): boolean;\n\n  // Spatial queries\n  raycast(origin: Vector3, direction:\
        \ Vector3): RaycastHit[];\n  pointInFace(point: Vector3, face: Face): boolean;\n  closestPointOnEdge(point: Vector3,\
        \ edge: Edge): { point: Vector3; t: number };\n  faceFaceIntersection(f1: Face, f2: Face): Vector3[] | null;\n  edgeFaceIntersection(edge:\
        \ Edge, face: Face): Vector3 | null;\n\n  // Validation\n  validate(): ValidationResult;\n  healTJunctions(tolerance:\
        \ number): number; // returns count of healed\n  computeFaceNormal(face: Face): Vector3;\n}\n\nexport interface RaycastHit\
        \ {\n  entity: Vertex | Edge | Face;\n  point: Vector3;\n  distance: number;\n  normal: Vector3;\n  faceIndex?: number;\n\
        }\n\nexport interface ValidationResult {\n  valid: boolean;\n  errors: ValidationError[];\n}\n\nexport interface ValidationError\
        \ {\n  type: 'non-planar-face' | 'degenerate-edge' | 'duplicate-vertex' | 'broken-topology' | 'inconsistent-normal';\n\
        \  entities: GeometryId[];\n  message: string;\n}\n```\n\n## Performance Notes\n- All topology queries must be O(1)\
        \ via half-edge traversal\n- Spatial queries use an octree (rebuilt lazily on geometry change)\n- Face normals and\
        \ areas are cached with dirty flags\n- Vertex positions use Float64Array for precision\n- Entity IDs are stable across\
        \ undo/redo (never reused)"
      references: https://en.wikipedia.org/wiki/Boundary_representation, https://en.wikipedia.org/wiki/Doubly_connected_edge_list
    references: https://en.wikipedia.org/wiki/Boundary_representation, https://en.wikipedia.org/wiki/Doubly_connected_edge_list
  uuid: 9eEZxKvS
- id: mesh.halfedge
  kind: mesh
  layer: geometry
  name: Half-Edge Mesh
  x:
    mesh:
      structure: half-edge
      attributes: position, normal, uv, color, materialIndex, selected, hidden, soft, smooth
      lod: false
    geometry:
      precision: float64
      topology: non-manifold
      representation: mesh
    perf:
      critical: true
      optimizations: Indexed vertex buffer for GPU upload, lazy normal recomputation, dirty flag system for incremental updates,
        pooled object allocation
    impl:
      language: TypeScript
      complexity: very-complex
      status: implemented
    docs:
      description: Primary mesh data structure using half-edge (DCEL) representation. Each edge is stored as two half-edges
        pointing in opposite directions, each belonging to a face.
      notes: "## Typed Interface\n\n```typescript\nimport { Vertex, Edge, HalfEdge, Face, Loop, GeometryId } from '../geometry/types';\n\
        import { Vector3, BoundingBox } from '../math/types';\nimport { Octree } from '../spatial/octree';\n\nexport interface\
        \ HalfEdgeMeshStats {\n  vertexCount: number;\n  edgeCount: number;\n  faceCount: number;\n  halfEdgeCount: number;\n\
        \  triangleCount: number; // after triangulation (for GPU)\n  boundaryEdgeCount: number; // edges with only one face\n\
        \  isManifold: boolean;\n  isWatertight: boolean;\n  eulerCharacteristic: number; // V - E + F\n}\n\nexport interface\
        \ GPUBufferData {\n  positions: Float32Array; // vec3 per vertex\n  normals: Float32Array; // vec3 per vertex\n  uvs:\
        \ Float32Array; // vec2 per vertex\n  colors: Float32Array; // vec4 per vertex (material color)\n  indices: Uint32Array;\
        \ // triangle indices\n  edgePositions: Float32Array; // line segment positions for edge rendering\n  edgeColors:\
        \ Float32Array; // per-edge colors (axis colors, selection)\n  selectedFaceIndices: Uint32Array; // triangle indices\
        \ of selected faces\n  selectedEdgePositions: Float32Array; // line positions of selected edges\n}\n\nexport class\
        \ HalfEdgeMesh {\n  // Storage\n  private vertices: Map<string, Vertex>;\n  private edges: Map<string, Edge>;\n  private\
        \ halfEdges: Map<string, HalfEdge>;\n  private faces: Map<string, Face>;\n  private spatialIndex: Octree;\n  private\
        \ gpuBuffersDirty: boolean;\n  private cachedGPUBuffers: GPUBufferData | null;\n\n  // CRUD\n  addVertex(position:\
        \ Vector3): Vertex;\n  addEdge(v1: Vertex, v2: Vertex): Edge;\n  addFace(vertexLoop: Vertex[], innerLoops?: Vertex[][]):\
        \ Face;\n  removeVertex(vertex: Vertex): void;\n  removeEdge(edge: Edge): void;\n  removeFace(face: Face): void;\n\
        \n  // Queries\n  getVertex(id: string): Vertex | undefined;\n  getEdge(id: string): Edge | undefined;\n  getFace(id:\
        \ string): Face | undefined;\n  getAllVertices(): IterableIterator<Vertex>;\n  getAllEdges(): IterableIterator<Edge>;\n\
        \  getAllFaces(): IterableIterator<Face>;\n  getStats(): HalfEdgeMeshStats;\n  getBoundingBox(): BoundingBox;\n\n\
        \  // Topology traversal\n  vertexEdges(vertex: Vertex): Edge[];\n  vertexFaces(vertex: Vertex): Face[];\n  edgeFaces(edge:\
        \ Edge): [Face | null, Face | null];\n  faceBoundary(face: Face): Edge[];\n  faceVertices(face: Face): Vertex[];\n\
        \  adjacentFaces(face: Face): Face[];\n\n  // GPU buffer generation\n  getGPUBuffers(): GPUBufferData; // lazy triangulation\
        \ + buffer generation\n  invalidateGPUBuffers(): void;\n\n  // Serialization (for undo/redo copy-on-write)\n  snapshot():\
        \ MeshSnapshot;\n  restoreFromSnapshot(snapshot: MeshSnapshot): void;\n  computeDelta(before: MeshSnapshot, after:\
        \ MeshSnapshot): MeshDelta;\n  applyDelta(delta: MeshDelta): void;\n  reverseDelta(delta: MeshDelta): MeshDelta;\n\
        }\n\nexport interface MeshSnapshot {\n  vertices: Map<string, { position: Float64Array }>;\n  edges: Map<string, {\
        \ v1: string; v2: string; soft: boolean; smooth: boolean }>;\n  faces: Map<string, { outerLoop: string[]; innerLoops:\
        \ string[][]; materialIndex: number }>;\n}\n\nexport interface MeshDelta {\n  addedVertices: Map<string, { position:\
        \ Float64Array }>;\n  removedVertices: Set<string>;\n  movedVertices: Map<string, { from: Float64Array; to: Float64Array\
        \ }>;\n  addedEdges: Map<string, { v1: string; v2: string }>;\n  removedEdges: Set<string>;\n  addedFaces: Map<string,\
        \ { outerLoop: string[]; materialIndex: number }>;\n  removedFaces: Map<string, { outerLoop: string[]; materialIndex:\
        \ number }>;\n}\n```\n\n## GPU Buffer Generation\nLazy triangulation: only re-triangulate dirty faces. Use ear-clipping\
        \ for simple convex faces, constrained Delaunay for complex/concave/holed faces. Output indexed triangle buffer +\
        \ separate line buffer for edge rendering."
      references: https://en.wikipedia.org/wiki/Doubly_connected_edge_list
    references: https://en.wikipedia.org/wiki/Doubly_connected_edge_list
  uuid: 6s5Lzex1
