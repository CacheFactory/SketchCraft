  - id: worker.mesh
    kind: worker
    layer: system
    name: Mesh Processing Worker
    x:
      worker:
        type: Web Worker
        task: >-
          Background mesh operations: boolean operations, triangulation, decimation, STL export, face intersection
          computation
      perf:
        critical: true
        optimizations: Transferable ArrayBuffers for zero-copy mesh data transfer, SharedArrayBuffer for shared geometry access
      impl:
        language: TypeScript
        complexity: complex
      docs:
        description: Web Worker dedicated to heavy mesh processing tasks that would block the UI thread.
        notes: >-
          ## Typed Interface


          ```typescript

          // ========== Worker Message Protocol ==========


          /** Messages: main thread → worker */

          export type MeshWorkerRequest =
            | { type: 'boolean'; id: string; op: 'union' | 'subtract' | 'intersect'; meshA: TransferableMesh; meshB: TransferableMesh }
            | { type: 'triangulate'; id: string; mesh: TransferableMesh }
            | { type: 'decimate'; id: string; mesh: TransferableMesh; targetFaceCount: number }
            | { type: 'intersect-faces'; id: string; meshA: TransferableMesh; meshB: TransferableMesh }
            | { type: 'compute-normals'; id: string; mesh: TransferableMesh; smoothAngle: number }
            | { type: 'validate'; id: string; mesh: TransferableMesh };

          /** Messages: worker → main thread */

          export type MeshWorkerResponse =
            | { type: 'result'; id: string; mesh: TransferableMesh }
            | { type: 'progress'; id: string; percent: number; message: string }
            | { type: 'error'; id: string; error: string }
            | { type: 'validation'; id: string; result: ValidationResult };

          /** Mesh data format for worker transfer (uses Transferable ArrayBuffers) */

          export interface TransferableMesh {
            positions: Float64Array; // [x,y,z, x,y,z, ...] — vertex positions
            indices: Uint32Array; // [i,j,k, i,j,k, ...] — triangle face indices
            faceGroups?: Uint32Array; // material index per face
            normals?: Float32Array; // per-vertex normals
            uvs?: Float32Array; // per-vertex UVs
          }


          // ========== Worker-side API ==========


          export class MeshWorker {
            private manifold: ManifoldModule | null; // lazy-loaded WASM

            constructor();

            // Message handler
            onMessage(event: MessageEvent<MeshWorkerRequest>): void;

            // Operations
            private performBoolean(op: string, meshA: TransferableMesh, meshB: TransferableMesh): TransferableMesh;
            private performTriangulate(mesh: TransferableMesh): TransferableMesh;
            private performDecimate(mesh: TransferableMesh, targetFaces: number): TransferableMesh;
            private performIntersectFaces(meshA: TransferableMesh, meshB: TransferableMesh): TransferableMesh;

            // Manifold WASM loading
            private ensureManifoldLoaded(): Promise<void>;

            // Progress reporting
            private reportProgress(id: string, percent: number, message: string): void;
          }


          // ========== Main thread wrapper ==========


          export class MeshWorkerClient {
            private worker: Worker;
            private pending: Map<string, { resolve: Function; reject: Function }>;

            constructor();

            // Typed async operations
            boolean(op: 'union' | 'subtract' | 'intersect', meshA: TransferableMesh, meshB: TransferableMesh, onProgress?: (p: number) => void): Promise<TransferableMesh>;
            triangulate(mesh: TransferableMesh): Promise<TransferableMesh>;
            decimate(mesh: TransferableMesh, targetFaceCount: number): Promise<TransferableMesh>;
            intersectFaces(meshA: TransferableMesh, meshB: TransferableMesh): Promise<TransferableMesh>;
            validate(mesh: TransferableMesh): Promise<ValidationResult>;

            // Lifecycle
            terminate(): void;
          }

          ```


          ## Transfer Protocol

          Use `postMessage()` with Transferable ArrayBuffers for zero-copy data transfer between threads. After
          transfer, the sender loses access to the buffer. The worker transfers the result buffer back the same way.


          ## Manifold WASM Loading

          Manifold is loaded lazily on first boolean operation. The WASM file is bundled with the app and loaded via
          `fetch()` inside the worker.
    uuid: 0KcEMSuo
