- id: data.document
  kind: scene_manager
  layer: data
  name: Model Document
  x:
    scene:
      hierarchy: tree
      layers: true
      groups: true
    impl:
      language: TypeScript
      complexity: complex
      status: implemented
    docs:
      description: The in-memory model document — the single source of truth for an open project. Owns and coordinates all
        model state.
      notes: "## Typed Interface\n\n```typescript\nimport { ISceneManager, ScenePage, Layer } from '../data/scene';\nimport\
        \ { ISelectionManager } from '../data/selection';\nimport { IHistoryManager } from '../data/history';\nimport { IMaterialManager,\
        \ Material } from '../data/materials';\nimport { HalfEdgeMesh } from '../geometry/mesh';\nimport { Vector3 } from\
        \ '../math/types';\n\nexport type LengthUnit = 'mm' | 'cm' | 'm' | 'inches' | 'feet';\n\nexport interface DocumentMetadata\
        \ {\n  name: string;\n  description: string;\n  author: string;\n  createdAt: number;\n  modifiedAt: number;\n  units:\
        \ LengthUnit;\n  geoLocation?: { latitude: number; longitude: number; northAngle: number };\n}\n\nexport interface\
        \ DocumentState {\n  dirty: boolean; // has unsaved changes\n  filePath: string | null; // null = never saved\n  autoSaveEnabled:\
        \ boolean;\n  autoSaveIntervalMs: number;\n  lastAutoSave: number | null;\n}\n\nexport interface IModelDocument {\n\
        \  // Sub-managers (owned)\n  readonly scene: ISceneManager;\n  readonly selection: ISelectionManager;\n  readonly\
        \ history: IHistoryManager;\n  readonly materials: IMaterialManager;\n\n  // Document state\n  readonly metadata:\
        \ DocumentMetadata;\n  readonly state: DocumentState;\n\n  // Lifecycle\n  static createNew(template?: string): IModelDocument;\n\
        \  static openFromFile(filePath: string, data: ArrayBuffer): Promise<IModelDocument>;\n  save(): Promise<ArrayBuffer>;\
        \ // serialize to native format\n  saveAs(filePath: string): Promise<void>;\n  close(): void; // cleanup, release\
        \ resources\n\n  // Metadata\n  setUnits(units: LengthUnit): void;\n  getUnits(): LengthUnit;\n  setMetadata(partial:\
        \ Partial<DocumentMetadata>): void;\n\n  // Dirty tracking\n  isDirty(): boolean;\n  markClean(): void; // after successful\
        \ save\n\n  // Auto-save\n  getAutoSaveData(): ArrayBuffer; // serialize for temp file\n  hasAutoSaveRecovery(filePath:\
        \ string): boolean;\n  recoverAutoSave(filePath: string): Promise<IModelDocument>;\n\n  // Import/Export (delegates\
        \ to file_format nodes)\n  importFile(format: string, data: ArrayBuffer, options?: any): Promise<void>;\n  exportFile(format:\
        \ string, options?: any): Promise<ArrayBuffer>;\n\n  // Events\n  on(event: 'dirty-changed' | 'saved' | 'units-changed'\
        \ | 'metadata-changed', handler: (data: any) => void): void;\n  off(event: string, handler: Function): void;\n}\n\
        ```\n\n## Document Ownership\nThe document is the root owner of all model state:\n- `document.scene` → SceneManager\
        \ (groups, layers, pages)\n- `document.selection` → SelectionManager\n- `document.history` → HistoryManager\n- `document.materials`\
        \ → MaterialManager\n- Scene graph nodes own their `HalfEdgeMesh` instances\n\n## Auto-Save\nEvery `autoSaveIntervalMs`\
        \ (default 5 min), serialize the document to a temp file in `app.getPath('temp')`. On crash recovery, check for temp\
        \ files newer than the last save."
