      description: "Three auto-face mechanisms in GeometryEngine:\n          (1) autoCreateFaces via createEdgeWithAutoFace():\
        \ BFS finds ALL closed coplanar loops (not just\n          shortest) through existing edges. Coplanarity tolerance\
        \ is 0.05 (practical for hand-drawn geometry).\n          (2) splitFaceWithEdge: splits face when edge connects two\
        \ non-adjacent boundary vertices.\n          (3) splitFaceWithPath(): splits face along multi-vertex path (arc). Handles\
        \ endpoints ON face\n          edges via proximity detection (0.05 threshold), vertex insertion, and edge splitting.\
        \ Both\n          resulting faces include arc vertices on shared boundary (no chord edge).\n          Guards: no self-edges,\
        \ no zero-length edges, no degenerate faces (< 3 unique vertices).\n          Arc tool uses plain createEdge + splitFaceWithPath.\
        \ Line tool uses createEdgeWithAutoFace."
