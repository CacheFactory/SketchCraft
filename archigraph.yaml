  - id: tool.pushpull
    kind: tool
    layer: interaction
    name: Push/Pull Tool
    x:
      tool:
        category: modify
        shortcut: P
        cursor: move
        icon: push-pull
      impl:
        language: TypeScript
        complexity: complex
      docs:
        description: >-
          SketchUp's signature tool. Click a face and drag to extrude it into a 3D solid. Push into a solid to cut away
          material. Double-click to repeat the last push/pull distance. Type exact distance in VCB. Works on any planar
          face.
        notes: >-
          ## Typed Interface


          ```typescript

          import { ITool, ToolContext, MouseEvent3D, KeyEvent } from '../types/tool';

          import { Face, Mesh, Edge, Vertex } from '../geometry/mesh';

          import { Vector3 } from '../math/types';

          import { InferenceResult } from '../geometry/inference';

          import { ExtrudeOperation, ExtrudeParams, ExtrudeResult } from '../operations/extrude';

          import { HistoryManager, Transaction } from '../data/history';


          export interface PushPullState {
            phase: 'idle' | 'face-picked' | 'dragging';
            targetFace: Face | null;
            faceNormal: Vector3 | null;
            dragStartPoint: Vector3 | null;
            currentDistance: number;
            lastDistance: number | null; // for double-click repeat
            createNewFace: boolean; // Ctrl mode - leave original face
            preview: ExtrudeResult | null;
            activeTransaction: Transaction | null;
          }


          export interface PushPullConfig {
            minDistance: number; // epsilon to avoid zero-height extrusions
            snapToExistingFaces: boolean; // snap to coplanar faces during drag
            autoBooleanSubtract: boolean; // push into solid = boolean cut
          }


          export class PushPullTool implements ITool {
            readonly id = 'tool.pushpull';
            readonly category = 'modify';
            readonly shortcut = 'P';
            readonly cursor = 'move';

            private state: PushPullState;
            private config: PushPullConfig;
            private extrudeOp: ExtrudeOperation;

            // Lifecycle
            activate(ctx: ToolContext): void;
            deactivate(): void;

            // Input
            onMouseDown(event: MouseEvent3D): void;
            onMouseMove(event: MouseEvent3D): void;
            onMouseUp(event: MouseEvent3D): void;
            onDoubleClick(event: MouseEvent3D): void; // repeat last distance
            onKeyDown(event: KeyEvent): void; // Ctrl=new face mode, Esc=cancel
            onVCBInput(value: string): void; // exact distance

            // Core logic
            private pickFace(event: MouseEvent3D): Face | null;
            private computeDistance(event: MouseEvent3D): number;
            private updatePreview(distance: number): void;
            private commitExtrude(distance: number): ExtrudeResult;
            private detectBooleanCut(face: Face, direction: Vector3, distance: number): boolean;
            private performBooleanCut(face: Face, distance: number): ExtrudeResult;
          }

          ```


          ## Extrusion Algorithm

          1. Pick a face → get face normal as extrude direction

          2. For each boundary edge of the face, create a side face (quad)

          3. Clone the original face and translate by `normal * distance`

          4. Connect side faces to cloned face edges

          5. If `distance < 0`, flip the direction (push into solid)

          6. If pushing into an existing solid, delegate to `op.boolean_subtract`

          7. Merge coplanar adjacent faces when applicable


          ## Double-Click Repeat

          Store `lastDistance` as static across tool activations. On double-click, pick face and immediately extrude by
          `lastDistance`.
        references: https://help.sketchup.com/en/sketchup/push-pulling-shapes
      references: https://help.sketchup.com/en/sketchup/push-pulling-shapes
    uuid: XlCNBL59
  - id: tool.move
    kind: tool
    layer: interaction
    name: Move Tool
    x:
      tool:
        category: modify
        shortcut: M
        cursor: move
        icon: move
      impl:
        language: TypeScript
        complexity: complex
      docs:
        description: >-
          Move selected entities by clicking a base point and destination. Inference engine snaps to axes and existing
          geometry. Type exact distance or coordinates in VCB. Ctrl+Move creates a copy. Type 'x3' after copy to create
          linear array.
        notes: >-
          ## Typed Interface


          ```typescript

          import { ITool, ToolContext, MouseEvent3D, KeyEvent } from '../types/tool';

          import { Entity } from '../data/scene';

          import { Vector3 } from '../math/types';

          import { InferenceResult } from '../geometry/inference';

          import { SelectionManager } from '../data/selection';

          import { HistoryManager, Transaction } from '../data/history';


          export interface MoveToolState {
            phase: 'idle' | 'base-point-picked' | 'moving';
            entities: Entity[]; // entities being moved
            basePoint: Vector3 | null;
            currentOffset: Vector3;
            copyMode: boolean; // Ctrl held = copy instead of move
            lockedAxis: 'x' | 'y' | 'z' | null;
            lastMoveVector: Vector3 | null; // for array repeat
            activeTransaction: Transaction | null;
          }


          export interface MoveResult {
            movedEntities: Entity[];
            copiedEntities: Entity[] | null; // if copy mode
            displacement: Vector3;
          }


          export class MoveTool implements ITool {
            readonly id = 'tool.move';
            readonly category = 'modify';
            readonly shortcut = 'M';
            readonly cursor = 'move';

            // Lifecycle
            activate(ctx: ToolContext): void;
            deactivate(): void;

            // Input
            onMouseDown(event: MouseEvent3D): void; // pick base point or destination
            onMouseMove(event: MouseEvent3D): void; // preview move
            onMouseUp(event: MouseEvent3D): void;
            onKeyDown(event: KeyEvent): void; // Ctrl=copy, Arrow=lock axis, Esc=cancel
            onVCBInput(value: string): void; // '500' = distance, '100,200,50' = offset, 'x3' = array

            // Core
            private pickBasePoint(event: MouseEvent3D): Vector3;
            private computeDisplacement(event: MouseEvent3D): Vector3;
            private applyMove(entities: Entity[], displacement: Vector3): MoveResult;
            private applyCopy(entities: Entity[], displacement: Vector3): MoveResult;
            private createLinearArray(entities: Entity[], displacement: Vector3, count: number): Entity[];
            private handleAutoFold(entity: Entity, displacement: Vector3): void; // fold connected faces
          }

          ```


          ## Auto-Fold

          When moving a vertex or edge that is shared between faces, and the move would break coplanarity, automatically
          fold the connected faces along the shared edge rather than creating invalid geometry.


          ## VCB Array Input

          After a copy-move, typing `x3` creates 2 additional copies (3 total) evenly spaced. Typing `/3` divides the
          distance into 3 equal copies.
    uuid: 56EqChJo
