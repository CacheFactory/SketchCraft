  - id: renderer.webgl
    kind: renderer
    layer: rendering
    name: WebGL Renderer
    x:
      renderer:
        engine: Three.js
        antialiasing: MSAA
        shadows: true
        postProcessing: SSAO, edge detection outlines, selection highlight glow
      perf:
        critical: true
        optimizations: >-
          Frustum culling, instanced rendering for components, LOD for distant objects, GPU picking for selection,
          batched geometry for draw call reduction
        benchmarks: Target 60fps for models up to 500K faces, 30fps for models up to 2M faces
      impl:
        language: TypeScript
        framework: Three.js
        complexity: very-complex
      docs:
        description: >-
          Core WebGL renderer built on Three.js. Manages the render loop, lighting (ambient + directional sun +
          hemisphere), grid/axes overlays, and render mode switching (wireframe/shaded/textured/xray). Selection
          highlighting swaps face mesh materials only (never edges) with polygonOffset for z-order. Pre-selection
          (hover) uses orange MeshBasicMaterial, selection uses blue. Edge materials are never touched to prevent
          disappearing lines. Entity objects registered via registerEntityObject() for raycasting. The raycaster
          in Viewport.raycastScene() prioritizes face hits over edge hits and uses tight Line thresholds (0.05).
        notes: >-
          ## Typed Interface


          ```typescript

          import * as THREE from 'three';

          import { EffectComposer } from 'three/examples/jsm/postprocessing/EffectComposer';

          import { HalfEdgeMesh, GPUBufferData } from '../geometry/mesh';

          import { ISceneManager, Group, ComponentInstance } from '../data/scene';

          import { ISelectionManager } from '../data/selection';

          import { IMaterialManager, Material } from '../data/materials';

          import { InferenceGuide } from '../geometry/inference';

          import { Camera } from '../rendering/camera';


          export type RenderMode = 'wireframe' | 'shaded' | 'textured' | 'rendered' | 'xray';


          export interface RenderStats {
            fps: number;
            frameTime: number; // ms
            drawCalls: number;
            triangles: number;
            geometryMemory: number; // bytes
            textureMemory: number; // bytes
          }


          export interface RenderOverlay {
            inferenceGuides: InferenceGuide[];
            selectionHighlights: string[]; // entity IDs
            preselectionHighlight: string | null;
            rubberBandGeometry: THREE.BufferGeometry | null; // tool preview lines
            gridVisible: boolean;
            axesVisible: boolean;
            sectionPlanes: SectionPlaneData[];
          }


          export interface SectionPlaneData {
            plane: THREE.Plane;
            active: boolean;
            showFill: boolean;
          }


          export interface IRenderer {
            // Setup
            initialize(canvas: HTMLCanvasElement, width: number, height: number): void;
            dispose(): void;
            resize(width: number, height: number): void;

            // Render loop
            startRenderLoop(): void;
            stopRenderLoop(): void;
            requestFrame(): void; // force re-render
            render(camera: Camera, overlay: RenderOverlay): void;

            // Scene sync
            syncScene(sceneManager: ISceneManager): void; // rebuild Three.js scene from scene graph
            syncMesh(meshId: string, mesh: HalfEdgeMesh): void; // update single mesh
            syncMaterial(material: Material): void; // update single material
            syncSelection(selectionManager: ISelectionManager): void;

            // Render mode
            setRenderMode(mode: RenderMode): void;
            getRenderMode(): RenderMode;

            // Picking (GPU-accelerated)
            pick(screenX: number, screenY: number): PickResult | null;
            pickRect(x1: number, y1: number, x2: number, y2: number): PickResult[];

            // Stats
            getStats(): RenderStats;

            // Configuration
            setShadowsEnabled(enabled: boolean): void;
            setAntialiasing(mode: 'none' | 'FXAA' | 'MSAA' | 'SMAA'): void;
            setBackgroundMode(mode: 'solid' | 'gradient' | 'environment'): void;
            setEdgeRendering(enabled: boolean, color?: string, width?: number): void;
          }


          export interface PickResult {
            entityId: string;
            entityType: 'vertex' | 'edge' | 'face' | 'group' | 'component_instance';
            point: THREE.Vector3; // world-space intersection point
            normal: THREE.Vector3; // face normal at hit point
            distance: number; // camera distance
            faceId?: string;
            edgeId?: string;
            vertexId?: string;
          }

          ```


          ## Render Pipeline (per frame)

          1. Sync dirty geometry (check HalfEdgeMesh dirty flags → update THREE.BufferGeometry)

          2. Sync dirty materials (check Material dirty flags → update THREE.MeshStandardMaterial)

          3. Depth pre-pass (for SSAO)

          4. Main color pass (PBR materials via shader.pbr)

          5. Edge/outline pass (shader.outline — Sobel edge detection)

          6. Selection highlight pass (shader.selection — stencil-based)

          7. SSAO pass

          8. Overlay pass (grid, axes, inference guides, rubber-band lines, dimensions)

          9. Present to canvas


          ## Instanced Rendering

          Component instances that share a definition use THREE.InstancedMesh. One draw call for all instances of the
          same component, with per-instance transform matrices.
    uuid: uJZVdiUn
