- id: test.fixture.models
  kind: test_fixture
  layer: testing
  name: Test Model Fixtures
  x:
    test:
      framework: Vitest
    impl:
      language: TypeScript
      complexity: moderate
      status: spec-only
    docs:
      description: Shared test fixtures providing pre-built 3D models and helper functions for all test suites.
      notes: "## Typed Interface\n\n```typescript\nimport { HalfEdgeMesh, Vertex, Edge, Face } from '../geometry/mesh';\n\
        import { ISceneManager, Group, ComponentDefinition } from '../data/scene';\nimport { Material } from '../data/materials';\n\
        import { Vector3 } from '../math/types';\n\n// ========== Fixture Models ==========\n\nexport interface TestFixtures\
        \ {\n  // Basic primitives\n  createEmptyScene(): ISceneManager;\n  createUnitCube(): { mesh: HalfEdgeMesh; faces:\
        \ Face[]; vertices: Vertex[] };\n  createUnitRectangle(): { mesh: HalfEdgeMesh; face: Face }; // flat rectangle on\
        \ XY plane\n  createLSolid(): { mesh: HalfEdgeMesh; faces: Face[] }; // L-shaped extrusion\n  createCylinder(segments?:\
        \ number): { mesh: HalfEdgeMesh; faces: Face[] };\n  createSphere(segments?: number): { mesh: HalfEdgeMesh; faces:\
        \ Face[] };\n\n  // Complex models\n  createHouseModel(): { scene: ISceneManager; groups: Group[] };\n  createOverlappingCubes():\
        \ { scene: ISceneManager; cubeA: Group; cubeB: Group };\n  createTwoCubes(): { scene: ISceneManager; cubeA: Group;\
        \ cubeB: Group };\n  createScatteredCubes(count: number): { scene: ISceneManager; cubes: Group[] };\n  createGroupedScene():\
        \ { scene: ISceneManager; groups: Group[]; components: ComponentDefinition[] };\n  createLayeredScene(): { scene:\
        \ ISceneManager; layers: string[] };\n\n  // Textured/material models\n  createTexturedModel(): { scene: ISceneManager;\
        \ materials: Material[] };\n  createComponentScene(): { scene: ISceneManager; definitions: ComponentDefinition[] };\n\
        \n  // Edge cases\n  createMeshWithHoles(): HalfEdgeMesh; // face with inner loops\n  createNonManifoldMesh(): HalfEdgeMesh;\
        \ // T-junction, butterfly vertex\n  createDegenerateMesh(): HalfEdgeMesh; // zero-area faces, duplicate vertices\n\
        \n  // Generated meshes for performance testing\n  createGeneratedMesh(faceCount: number): HalfEdgeMesh; // subdivided\
        \ grid\n  createRandomMesh(vertexCount: number): HalfEdgeMesh;\n}\n\n// ========== Assertion Helpers ==========\n\n\
        export interface MeshAssertions {\n  assertMeshValid(mesh: HalfEdgeMesh): void; // topology, normals, planarity\n\
        \  assertTopologyConsistent(mesh: HalfEdgeMesh): void; // half-edge invariants\n  assertManifold(mesh: HalfEdgeMesh):\
        \ void;\n  assertWatertight(mesh: HalfEdgeMesh): void;\n  assertFaceCount(mesh: HalfEdgeMesh, expected: number): void;\n\
        \  assertVertexCount(mesh: HalfEdgeMesh, expected: number): void;\n  assertEdgeCount(mesh: HalfEdgeMesh, expected:\
        \ number): void;\n  assertEulerCharacteristic(mesh: HalfEdgeMesh, expected: number): void; // V-E+F\n  assertBoundingBox(mesh:\
        \ HalfEdgeMesh, min: Vector3, max: Vector3, tolerance?: number): void;\n  assertVolume(mesh: HalfEdgeMesh, expected:\
        \ number, tolerance?: number): void;\n  assertSurfaceArea(mesh: HalfEdgeMesh, expected: number, tolerance?: number):\
        \ void;\n}\n\n// ========== Screenshot Helpers (for visual regression) ==========\n\nexport interface ScreenshotHelpers\
        \ {\n  compareScreenshot(page: any, name: string, threshold?: number): Promise<boolean>;\n  updateGoldenScreenshot(page:\
        \ any, name: string): Promise<void>;\n}\n\n// ========== Playwright Helpers ==========\n\nexport interface E2EHelpers\
        \ {\n  launchApp(): Promise<AppHelper>;\n  loadFixtureFile(name: string): Promise<ArrayBuffer>; // load .obj/.stl/.gltf\
        \ fixture file\n  waitForMeshReady(page: any): Promise<void>; // wait for geometry to finish loading\n  waitForRenderFrame(page:\
        \ any): Promise<void>; // wait for next render frame\n}\n```\n\n## Fixture File Inventory\n- `fixtures/cube.scf` —\
        \ Unit cube (6 faces, 8 vertices, 12 edges)\n- `fixtures/rectangle.scf` — Flat rectangle on XY plane (1 face)\n- `fixtures/house.scf`\
        \ — Simple house (walls + peaked roof, ~50 faces)\n- `fixtures/overlapping-cubes.scf` — Two overlapping cubes for\
        \ boolean tests\n- `fixtures/grouped-scene.scf` — Scene with nested groups and components\n- `fixtures/textured-model.scf`\
        \ — Model with multiple PBR materials\n- `fixtures/sample.obj` — Reference OBJ file\n- `fixtures/sample-binary.stl`\
        \ — Reference binary STL\n- `fixtures/sample-ascii.stl` — Reference ASCII STL\n- `fixtures/sample.gltf` — Reference\
        \ glTF with materials\n- `fixtures/sample.step` — Reference STEP mechanical part\n- `fixtures/sample.dxf` — Reference\
        \ DXF floor plan\n- `fixtures/sample.fbx` — Reference FBX model\n- `fixtures/corrupt.obj` — Deliberately malformed\
        \ file\n- `fixtures/large-100k.obj` — Large 100K-face model for performance"
