        \ | null;\n\n  // Mode\n  setMode(mode: SelectionMode): void;\n  getMode(): SelectionMode;\n\n  // Events\n  on(event:\
        \ 'selection-changed', handler: (e: SelectionChangeEvent) => void): void;\n  on(event: 'preselection-changed', handler:\
        \ (entity: SelectableEntity | null) => void): void;\n  off(event: string, handler: Function): void;\n}\n```\n\n##\
        \ Selection Rules\n- In `object` mode: clicking a face selects its parent group/component (if any), or the face if\
