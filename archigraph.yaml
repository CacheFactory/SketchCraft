        \nexport type CameraProjection = 'perspective' | 'orthographic';\nexport type StandardView = 'front' | 'back' | 'left'\
        \ | 'right' | 'top' | 'bottom' | 'iso';\n\nexport interface CameraState {\n  position: Vector3;\n  target: Vector3;\
        \ // orbit center\n  up: Vector3;\n  fov: number; // perspective FOV in degrees\n  orthoScale: number; // orthographic\
        \ zoom\n  projection: CameraProjection;\n  near: number;\n  far: number;\n}\n\nexport interface CameraAnimationOptions\
        \ {\n  duration: number; // ms, default 300\n  easing: 'linear' | 'ease-in-out' | 'ease-out'; // default 'ease-in-out'\n\
        }\n\nexport interface ICameraController {\n  // State\n  getState(): CameraState;\n  setState(state: Partial<CameraState>,\
        \ animate?: boolean): void;\n  getThreeCamera(): THREE.PerspectiveCamera | THREE.OrthographicCamera;\n\n  // Navigation\n\
        \  orbit(deltaAzimuth: number, deltaElevation: number): void;\n  pan(deltaX: number, deltaY: number): void; // screen-space\
        \ pixels\n  zoom(delta: number, cursorWorldPos?: Vector3): void; // zoom toward cursor\n  dolly(distance: number):\
        \ void;\n\n  // Standard views\n  setStandardView(view: StandardView, animate?: boolean): void;\n  zoomExtents(boundingBox:\
        \ THREE.Box3, animate?: boolean): void;\n  zoomToSelection(entities: any[], animate?: boolean): void;\n\n  // Projection\n\
        \  setProjection(projection: CameraProjection, animate?: boolean): void;\n  toggleProjection(): void;\n\n  // FOV\n\
        \  setFOV(degrees: number): void;\n  getFOV(): number;\n\n  // View undo/redo\n  pushViewState(): void; // save current\
        \ view to view history\n  undoView(): void;\n  redoView(): void;\n\n  // Screen ↔ World conversion\n  screenToWorld(screenX:\
        \ number, screenY: number, depth?: number): Vector3;\n  worldToScreen(worldPos: Vector3): { x: number; y: number;\
        \ depth: number };\n  screenToRay(screenX: number, screenY: number): { origin: Vector3; direction: Vector3 };\n\n\
        \  // Configuration\n  setOrbitSpeed(speed: number): void;\n  setPanSpeed(speed: number): void;\n  setZoomSpeed(speed:\
        \ number): void;\n  setMinDistance(distance: number): void;\n  setMaxDistance(distance: number): void;\n}\n```\n\n\
        ## Orbit Behavior (SketchUp-style)\n- Orbit center = last clicked point on geometry (or scene center if no hit)\n\
        - Vertical orbit wraps but has soft limits to prevent flipping\n- Zoom scrolls toward the 3D point under cursor (not\
        \ just along camera forward)\n- Pan speed scales with distance from target\n- Smooth transitions between standard\
        \ views (slerp rotation, lerp position)"
