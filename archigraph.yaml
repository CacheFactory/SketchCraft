    docs:
      description: Electron renderer process for the main window. Runs React UI, Three.js viewport, tool system, and all data
        managers.
      notes: "## Typed Interface\n\n```typescript\nimport { MainProcessAPI, RendererEvents } from '../system/main-process';\n\
        import { IModelDocument } from '../data/document';\nimport { IRenderer } from '../rendering/renderer';\nimport { ICameraController\
        \ } from '../rendering/camera';\nimport { IInferenceEngine } from '../geometry/inference';\nimport { ITool } from\
        \ '../types/tool';\n\n/** Global API exposed via preload script */\ndeclare global {\n  interface Window {\n    api:\
        \ {\n      invoke<K extends keyof MainProcessAPI>(channel: K, ...args: Parameters<MainProcessAPI[K]>): ReturnType<MainProcessAPI[K]>;\n\
        \      on<K extends keyof RendererEvents>(channel: K, handler: (data: RendererEvents[K]) => void): void;\n      off<K\
        \ extends keyof RendererEvents>(channel: K, handler: Function): void;\n    };\n  }\n}\n\n/** Application singleton\
        \ — bootstrapped in renderer entry point */\nexport interface IApplication {\n  // Core subsystems\n  readonly document:\
        \ IModelDocument;\n  readonly renderer: IRenderer;\n  readonly camera: ICameraController;\n  readonly inference: IInferenceEngine;\n\
        \  readonly toolManager: IToolManager;\n\n  // Lifecycle\n  initialize(canvas: HTMLCanvasElement): Promise<void>;\n\
        \  dispose(): void;\n\n  // Document operations\n  newDocument(): Promise<void>;\n  openDocument(): Promise<void>;\n\
        \  saveDocument(): Promise<void>;\n  saveDocumentAs(): Promise<void>;\n  importFile(): Promise<void>;\n  exportFile(format:\
        \ string): Promise<void>;\n\n  // Tool management\n  activateTool(toolId: string): void;\n  getActiveTool(): ITool\
        \ | null;\n  getAvailableTools(): ITool[];\n}\n\nexport interface IToolManager {\n  registerTool(tool: ITool): void;\n\
        \  unregisterTool(toolId: string): void;\n  activateTool(toolId: string): void;\n  deactivateTool(): void;\n  getActiveTool():\
        \ ITool | null;\n  getTool(toolId: string): ITool | undefined;\n  getAllTools(): ITool[];\n  on(event: 'tool-changed',\
        \ handler: (tool: ITool | null) => void): void;\n}\n```\n\n## Bootstrap Sequence\n1. `window.api` available from preload\n\
        2. Create React root and mount `<App />`\n3. Initialize IModelDocument (new or from file)\n4. Initialize IRenderer\
        \ (Three.js on canvas)\n5. Initialize ICameraController\n6. Initialize IInferenceEngine\n7. Register all tools with\
        \ IToolManager\n8. Start render loop\n9. Listen for `menu:action` events from main process"
  uuid: pqtkBdp1
- id: worker.mesh
  kind: worker
  layer: system
  name: Mesh Processing Worker
  x:
    worker:
      type: Web Worker
      task: 'Background mesh operations: boolean operations, triangulation, decimation, STL export, face intersection computation'
    perf:
      critical: true
      optimizations: Transferable ArrayBuffers for zero-copy mesh data transfer, SharedArrayBuffer for shared geometry access
    impl:
      language: TypeScript
      complexity: complex
      status: basic
    docs:
      description: Web Worker dedicated to heavy mesh processing tasks that would block the UI thread.
      notes: "## Typed Interface\n\n```typescript\n// ========== Worker Message Protocol ==========\n\n/** Messages: main\
        \ thread → worker */\nexport type MeshWorkerRequest =\n  | { type: 'boolean'; id: string; op: 'union' | 'subtract'\
        \ | 'intersect'; meshA: TransferableMesh; meshB: TransferableMesh }\n  | { type: 'triangulate'; id: string; mesh:\
        \ TransferableMesh }\n  | { type: 'decimate'; id: string; mesh: TransferableMesh; targetFaceCount: number }\n  | {\
        \ type: 'intersect-faces'; id: string; meshA: TransferableMesh; meshB: TransferableMesh }\n  | { type: 'compute-normals';\
        \ id: string; mesh: TransferableMesh; smoothAngle: number }\n  | { type: 'validate'; id: string; mesh: TransferableMesh\
        \ };\n\n/** Messages: worker → main thread */\nexport type MeshWorkerResponse =\n  | { type: 'result'; id: string;\
        \ mesh: TransferableMesh }\n  | { type: 'progress'; id: string; percent: number; message: string }\n  | { type: 'error';\
        \ id: string; error: string }\n  | { type: 'validation'; id: string; result: ValidationResult };\n\n/** Mesh data\
        \ format for worker transfer (uses Transferable ArrayBuffers) */\nexport interface TransferableMesh {\n  positions:\
        \ Float64Array; // [x,y,z, x,y,z, ...] — vertex positions\n  indices: Uint32Array; // [i,j,k, i,j,k, ...] — triangle\
        \ face indices\n  faceGroups?: Uint32Array; // material index per face\n  normals?: Float32Array; // per-vertex normals\n\
        \  uvs?: Float32Array; // per-vertex UVs\n}\n\n// ========== Worker-side API ==========\n\nexport class MeshWorker\
        \ {\n  private manifold: ManifoldModule | null; // lazy-loaded WASM\n\n  constructor();\n\n  // Message handler\n\
        \  onMessage(event: MessageEvent<MeshWorkerRequest>): void;\n\n  // Operations\n  private performBoolean(op: string,\
        \ meshA: TransferableMesh, meshB: TransferableMesh): TransferableMesh;\n  private performTriangulate(mesh: TransferableMesh):\
        \ TransferableMesh;\n  private performDecimate(mesh: TransferableMesh, targetFaces: number): TransferableMesh;\n \
        \ private performIntersectFaces(meshA: TransferableMesh, meshB: TransferableMesh): TransferableMesh;\n\n  // Manifold\
        \ WASM loading\n  private ensureManifoldLoaded(): Promise<void>;\n\n  // Progress reporting\n  private reportProgress(id:\
        \ string, percent: number, message: string): void;\n}\n\n// ========== Main thread wrapper ==========\n\nexport class\
        \ MeshWorkerClient {\n  private worker: Worker;\n  private pending: Map<string, { resolve: Function; reject: Function\
        \ }>;\n\n  constructor();\n\n  // Typed async operations\n  boolean(op: 'union' | 'subtract' | 'intersect', meshA:\
        \ TransferableMesh, meshB: TransferableMesh, onProgress?: (p: number) => void): Promise<TransferableMesh>;\n  triangulate(mesh:\
        \ TransferableMesh): Promise<TransferableMesh>;\n  decimate(mesh: TransferableMesh, targetFaceCount: number): Promise<TransferableMesh>;\n\
        \  intersectFaces(meshA: TransferableMesh, meshB: TransferableMesh): Promise<TransferableMesh>;\n  validate(mesh:\
        \ TransferableMesh): Promise<ValidationResult>;\n\n  // Lifecycle\n  terminate(): void;\n}\n```\n\n## Transfer Protocol\n\
        Use `postMessage()` with Transferable ArrayBuffers for zero-copy data transfer between threads. After transfer, the\
        \ sender loses access to the buffer. The worker transfers the result buffer back the same way.\n\n## Manifold WASM\
        \ Loading\nManifold is loaded lazily on first boolean operation. The WASM file is bundled with the app and loaded\
        \ via `fetch()` inside the worker."
  uuid: 0KcEMSuo
- id: worker.fileio
  kind: worker
  layer: system
  name: File I/O Worker
  x:
    worker:
