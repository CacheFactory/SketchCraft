          ## Typed Interface

          ```typescript
          import { TransferableMesh } from './mesh-worker';

          /** Messages: main thread → worker */
          export type FileIORequest =
            | { type: 'import'; id: string; format: 'obj' | 'stl' | 'gltf' | 'dxf' | 'fbx' | 'step'; data: ArrayBuffer; options?: any }
            | { type: 'export'; id: string; format: 'obj' | 'stl' | 'gltf' | 'dxf' | 'fbx'; mesh: TransferableMesh; materials?: SerializedMaterial[]; options?: any };

          /** Messages: worker → main thread */
          export type FileIOResponse =
            | { type: 'import-result'; id: string; result: ImportedScene }
            | { type: 'export-result'; id: string; data: ArrayBuffer }
            | { type: 'progress'; id: string; percent: number; message: string }
            | { type: 'error'; id: string; error: string };

          export interface ImportedScene {
            meshes: ImportedMesh[];
            materials: SerializedMaterial[];
            hierarchy: SceneNode[];
          }

          export interface ImportedMesh {
            name: string;
            positions: Float64Array;
            indices: Uint32Array;
            normals?: Float32Array;
            uvs?: Float32Array;
            materialIndex: number;
          }

          export interface SerializedMaterial {
            name: string;
            albedoColor: [number, number, number];
            roughness: number;
            metalness: number;
            opacity: number;
            albedoTextureData?: ArrayBuffer; // embedded texture
            albedoTextureFormat?: 'png' | 'jpg';
          }

          export interface SceneNode {
            name: string;
            meshIndices: number[];
            transform: number[]; // 4x4 matrix as 16 floats
            children: SceneNode[];
          }

          // ========== Main thread wrapper ==========

          export class FileIOWorkerClient {
            private worker: Worker;
            private pending: Map<string, { resolve: Function; reject: Function }>;

            importFile(format: string, data: ArrayBuffer, options?: any, onProgress?: (p: number) => void): Promise<ImportedScene>;
            exportFile(format: string, mesh: TransferableMesh, materials?: SerializedMaterial[], options?: any, onProgress?: (p: number) => void): Promise<ArrayBuffer>;
            terminate(): void;
          }
          ```

          ## Format-Specific Notes
          - **OBJ**: Pure JS parser. Handles v/vn/vt/f lines, material .mtl references.
          - **STL**: Binary header check (80 bytes), then triangle loop. Very simple.
          - **glTF**: Use Three.js GLTFLoader adapted for worker (no DOM). Parse JSON + binary buffers.
          - **DXF**: Parse ASCII DXF entities (LINE, 3DFACE, CIRCLE, ARC, POLYLINE, BLOCK).
          - **FBX**: Use fbx-parser library for binary FBX decoding.
          - **STEP**: Load OpenCascade WASM on demand. Heavy — show progress bar.
    uuid: t7DdLeOV
