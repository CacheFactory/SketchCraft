          ```typescript
          import { Entity, EntityType } from '../data/scene';
          import { Vertex, Edge, Face } from '../geometry/mesh';
          import { Rect2D } from '../math/types';

          export type SelectableEntity = Vertex | Edge | Face | Entity;

          export type SelectionMode = 'object' | 'face' | 'edge' | 'vertex';

          export interface SelectionState {
            mode: SelectionMode;
            entities: Set<string>; // selected entity IDs
