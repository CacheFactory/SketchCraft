meta:
  system: SketchCraft
  description: A local desktop 3D CAD application inspired by SketchUp, built with Electron. Features intuitive push/pull
    modeling, real-time 3D rendering via Three.js, solid geometry operations via Manifold, and a plugin architecture for extensibility.
    All computation runs locally — no cloud dependencies.
  environment:
  - desktop
  tags:
  - cad
  - 3d-modeling
  - electron
  - sketchup-clone
  - local-first
  owners:
  - core-team
