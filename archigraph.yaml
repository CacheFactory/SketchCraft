  - id: tool.select
    kind: tool
    layer: interaction
    name: Select Tool
    x:
      tool:
        category: select
        shortcut: Space
        cursor: pointer
        icon: cursor-arrow
      impl:
        language: TypeScript
        complexity: complex
      docs:
        description: >-
          Primary selection tool. Single click selects entities (faces, edges, groups, components). Click+drag creates a
          selection box (left-to-right = window select, right-to-left = crossing select). Double-click enters
          group/component editing context. Triple-click selects all connected geometry. Shift+click toggles selection.
          Ctrl+click adds to selection.
        notes: >-
          ## Typed Interface


          ```typescript

          import { ITool, ToolContext, ToolEvent, MouseEvent3D, KeyEvent } from '../types/tool';

          import { SelectionManager, SelectionSet, SelectionMode } from '../data/selection';

          import { SceneManager, Entity, EntityType } from '../data/scene';

          import { RaycastResult } from '../rendering/raycast';

          import { InferenceResult } from '../geometry/inference';

          import { Rect2D, Vector2 } from '../math/types';


          export interface SelectToolState {
            mode: 'idle' | 'clicking' | 'box-selecting' | 'dragging';
            boxStart: Vector2 | null;
            boxEnd: Vector2 | null;
            boxDirection: 'window' | 'crossing'; // left-to-right vs right-to-left
            lastClickTime: number;
            clickCount: number; // for double/triple click detection
            hoverEntity: Entity | null;
          }


          export interface SelectToolConfig {
            doubleClickTimeout: number; // ms, default 300
            tripleClickTimeout: number; // ms, default 500
            dragThreshold: number; // pixels before click becomes drag, default 5
            boxSelectColor: { window: string; crossing: string };
          }


          export class SelectTool implements ITool {
            readonly id = 'tool.select';
            readonly category = 'select';
            readonly shortcut = 'Space';
            readonly cursor = 'pointer';

            private state: SelectToolState;
            private config: SelectToolConfig;
            private ctx: ToolContext;

            // Lifecycle
            activate(ctx: ToolContext): void;
            deactivate(): void;

            // Input handlers
            onMouseDown(event: MouseEvent3D): void;
            onMouseMove(event: MouseEvent3D): void;
            onMouseUp(event: MouseEvent3D): void;
            onKeyDown(event: KeyEvent): void;
            onKeyUp(event: KeyEvent): void;

            // Internal
            private performRaycast(event: MouseEvent3D): RaycastResult | null;
            private handleSingleClick(hit: RaycastResult | null, modifiers: { shift: boolean; ctrl: boolean }): void;
            private handleDoubleClick(hit: RaycastResult): void;
            private handleTripleClick(hit: RaycastResult): void;
            private updateBoxSelection(start: Vector2, end: Vector2, direction: 'window' | 'crossing'): void;
            private getEntitiesInBox(rect: Rect2D, mode: 'window' | 'crossing'): Entity[];
            private updatePreselectionHighlight(event: MouseEvent3D): void;
          }

          ```


          ## Selection Logic

          - **Single click**: `selectionManager.replace(hit.entity)` or `selectionManager.clear()` if no hit

          - **Shift+click**: `selectionManager.toggle(hit.entity)`

          - **Ctrl+click**: `selectionManager.add(hit.entity)`

          - **Double-click on group**: `sceneManager.enterEditingContext(hit.entity)`

          - **Triple-click**: `selectionManager.selectConnected(hit.entity)`

          - **Box select (window)**: Only entities fully inside the box

          - **Box select (crossing)**: Entities intersecting or inside the box


          ## Pre-selection

          On every mouseMove, raycast and highlight the entity under cursor with a subtle overlay (different from full
          selection highlight). This gives the user visual feedback before clicking.
    uuid: ceUtTwvQ
  - id: tool.line
    kind: tool
    layer: interaction
    name: Line Tool
    x:
      tool:
        category: draw
        shortcut: L
        cursor: crosshair
        icon: line
      impl:
        language: TypeScript
        complexity: moderate
      docs:
        description: >-
          Draw edges (lines) by clicking start and end points. Supports inference engine: snaps to axes
          (red/green/blue), endpoints, midpoints, on-edge, on-face, perpendicular, parallel. Type a length in the VCB to
          set exact distance. Automatically creates faces when edges form a closed coplanar loop. Press Esc to finish.
        notes: >-
          ## Typed Interface


          ```typescript

          import { ITool, ToolContext, MouseEvent3D, KeyEvent } from '../types/tool';

          import { Vector3 } from '../math/types';

          import { InferenceResult, InferenceEngine } from '../geometry/inference';

          import { Edge, Face, Vertex } from '../geometry/mesh';

          import { SceneManager } from '../data/scene';

          import { HistoryManager, Transaction } from '../data/history';


          export interface LineToolState {
            phase: 'idle' | 'drawing'; // idle = waiting for first click, drawing = placing subsequent points
            points: Vector3[]; // accumulated points in current polyline
            currentInference: InferenceResult | null;
            activeTransaction: Transaction | null;
            lockedAxis: 'x' | 'y' | 'z' | null; // arrow key axis lock
          }


          export interface LineToolResult {
            edges: Edge[]; // newly created edges
            faces: Face[]; // auto-detected faces from closed loops
            vertices: Vertex[]; // new or snapped-to vertices
          }


          export class LineTool implements ITool {
            readonly id = 'tool.line';
            readonly category = 'draw';
            readonly shortcut = 'L';
            readonly cursor = 'crosshair';

            private state: LineToolState;
            private ctx: ToolContext;
            private inference: InferenceEngine;

            // Lifecycle
            activate(ctx: ToolContext): void;
            deactivate(): void;

            // Input
            onMouseDown(event: MouseEvent3D): void; // place point
            onMouseMove(event: MouseEvent3D): void; // update inference preview
            onMouseUp(event: MouseEvent3D): void;
            onKeyDown(event: KeyEvent): void; // Esc=finish, Arrow=lock axis, Enter=finish
            onVCBInput(value: string): void; // typed distance like '500' or '300,200'

            // Core logic
            private placePoint(position: Vector3, inference: InferenceResult | null): void;
            private createEdge(from: Vector3, to: Vector3): Edge;
            private detectClosedLoop(edges: Edge[]): Face | null;
            private finishDrawing(): LineToolResult;
            private updatePreview(cursorPos: Vector3, inference: InferenceResult | null): void;
            private drawRubberBandLine(from: Vector3, to: Vector3, axisColor?: string): void;
          }

          ```


          ## Face Auto-Detection

          After each edge is created, check if the new edge completes a closed loop of coplanar edges. If so,
          automatically create a Face from that loop. Algorithm:

          1. From the new edge's endpoint, traverse connected edges

          2. If a path returns to the start vertex and all edges are coplanar (within tolerance), create face

          3. Use the face normal consistent with the winding order


          ## VCB Input

          - Single number `500`: set edge length to 500 in current direction

          - Two numbers `300,200`: set relative X,Y offset from start point

          - Three numbers `100,200,50`: set relative X,Y,Z offset

          - Negative numbers allowed for reverse direction
    uuid: WXBGmpCI
