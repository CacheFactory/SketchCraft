        notes: |-
          ## Typed Interface

          ```typescript
          import { ITool, ToolContext } from '../types/tool';
          import { Operation, OperationParams, OperationResult } from '../types/operation';
          import { ISceneManager, Entity } from '../data/scene';
          import { ISelectionManager } from '../data/selection';
          import { IMaterialManager, Material } from '../data/materials';
          import { HalfEdgeMesh, Vertex, Edge, Face } from '../geometry/mesh';

          // ========== Plugin Manifest (manifest.json) ==========
          export interface PluginManifest {
            id: string; // unique plugin ID: 'com.example.my-plugin'
            name: string;
            version: string;
            description: string;
            author: string;
            entry: string; // relative path to main JS/TS file
            permissions: PluginPermission[];
            dependencies?: Record<string, string>; // other plugin IDs + versions
          }

          export type PluginPermission =
            | 'scene:read' // read scene graph
            | 'scene:write' // modify scene graph
            | 'geometry:read' // read mesh data
            | 'geometry:write' // modify mesh data
            | 'materials:read'
            | 'materials:write'
            | 'ui:panel' // create UI panels
            | 'ui:toolbar' // add toolbar buttons
            | 'ui:menu' // add menu items
            | 'file:import' // register file importers
            | 'file:export' // register file exporters
            | 'filesystem:read' // read files (sandboxed)
            | 'filesystem:write'; // write files (sandboxed)

          // ========== Plugin API (provided to plugins) ==========
          export interface PluginAPI {
            // Registration
            registerTool(tool: ITool): void;
            registerOperation(operation: Operation): void;
            registerFileImporter(format: string, importer: FileImporter): void;
            registerFileExporter(format: string, exporter: FileExporter): void;
            registerPanel(panel: PanelDefinition): void;
            registerMenuItem(menu: string, item: MenuItemDefinition): void;

            // Scene access (sandboxed)
            readonly scene: Readonly<ISceneManager>; // read-only unless scene:write permission
            readonly selection: Readonly<ISelectionManager>;
            readonly materials: Readonly<IMaterialManager>;

            // Geometry access (sandboxed)
            getMesh(entityId: string): Readonly<HalfEdgeMesh> | null;
            modifyMesh(entityId: string, callback: (mesh: HalfEdgeMesh) => void): void; // wrapped in transaction

            // UI
            showDialog(options: DialogOptions): Promise<DialogResult>;
            showNotification(message: string, type: 'info' | 'warning' | 'error'): void;
            log(message: string, level?: 'debug' | 'info' | 'warn' | 'error'): void;
          }

          export interface FileImporter {
            extensions: string[]; // ['.xyz', '.pts']
            description: string;
            import(data: ArrayBuffer, options?: any): Promise<ImportResult>;
          }

          export interface FileExporter {
            extensions: string[];
            description: string;
            export(scene: ISceneManager, options?: any): Promise<ArrayBuffer>;
          }

          export interface ImportResult {
            vertices: Float64Array;
            faces: Uint32Array;
            materials?: Material[];
          }

          export interface PanelDefinition {
            id: string;
            title: string;
            icon: string;
            position: 'left' | 'right' | 'bottom';
