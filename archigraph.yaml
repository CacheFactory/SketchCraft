- id: data.scene
  kind: scene_manager
  layer: data
  name: Scene Manager
  x:
    scene:
      hierarchy: tree
      layers: true
      groups: true
    impl:
      language: TypeScript
      complexity: complex
      status: implemented
    docs:
      description: Manages the hierarchical scene graph. Root contains loose geometry, groups, and component instances.
      notes: "## Typed Interface\n\n```typescript\nimport { HalfEdgeMesh } from '../geometry/mesh';\nimport { Matrix4, Vector3\
        \ } from '../math/types';\nimport { Material } from '../data/materials';\n\n// ========== Scene Graph Types ==========\n\
        \nexport type EntityType = 'vertex' | 'edge' | 'face' | 'group' | 'component_instance' | 'component_definition' |\
        \ 'guide_line' | 'guide_point' | 'dimension' | 'text' | 'section_plane' | 'image';\n\nexport interface Entity {\n\
        \  readonly id: string;\n  readonly type: EntityType;\n  name: string;\n  layer: Layer;\n  visible: boolean;\n  locked:\
        \ boolean;\n  parentGroup: Group | null;\n}\n\nexport interface Group extends Entity {\n  type: 'group';\n  transform:\
        \ Matrix4; // local-to-parent transform\n  mesh: HalfEdgeMesh; // geometry in local coords\n  children: Entity[];\
        \ // nested groups/instances\n}\n\nexport interface ComponentDefinition {\n  readonly id: string;\n  name: string;\n\
        \  description: string;\n  mesh: HalfEdgeMesh; // prototype geometry\n  instances: ComponentInstance[];\n  thumbnail:\
        \ ImageBitmap | null;\n}\n\nexport interface ComponentInstance extends Entity {\n  type: 'component_instance';\n \
        \ definition: ComponentDefinition;\n  transform: Matrix4; // local-to-parent transform\n  // geometry comes from definition.mesh\
        \ — all instances share it\n}\n\nexport interface Layer {\n  readonly id: string;\n  name: string;\n  visible: boolean;\n\
        \  locked: boolean;\n  color: string; // for color-by-layer mode\n  isDefault: boolean;\n}\n\nexport interface ScenePage\
        \ {\n  readonly id: string;\n  name: string;\n  cameraPosition: Vector3;\n  cameraTarget: Vector3;\n  cameraFov: number;\n\
        \  cameraProjection: 'perspective' | 'orthographic';\n  layerVisibility: Map<string, boolean>;\n  activeSectionPlanes:\
        \ string[];\n  renderMode: string;\n}\n\nexport interface EditingContext {\n  path: Group[]; // stack of groups we've\
        \ entered\n  currentGroup: Group | null; // null = editing root\n  activeEntities: Set<string>; // IDs of entities\
        \ in current context (editable)\n}\n\n// ========== Scene Manager API ==========\n\nexport interface ISceneManager\
        \ {\n  // Scene graph\n  readonly root: Group; // root group containing all top-level entities\n  readonly editingContext:\
        \ EditingContext;\n\n  // Entity management\n  addEntity(entity: Entity, parent?: Group): void;\n  removeEntity(entity:\
        \ Entity): void;\n  moveEntity(entity: Entity, newParent: Group): void;\n  getEntity(id: string): Entity | undefined;\n\
        \  getAllEntities(): Entity[];\n  findEntitiesByType(type: EntityType): Entity[];\n\n  // Groups\n  createGroup(entities:\
        \ Entity[]): Group;\n  explodeGroup(group: Group): Entity[];\n  enterEditingContext(group: Group): void;\n  exitEditingContext():\
        \ void;\n\n  // Components\n  createComponentDefinition(group: Group, name: string): ComponentDefinition;\n  placeComponentInstance(definition:\
        \ ComponentDefinition, transform: Matrix4): ComponentInstance;\n  makeUnique(instance: ComponentInstance): ComponentDefinition;\n\
        \n  // Layers\n  createLayer(name: string): Layer;\n  deleteLayer(layer: Layer): void;\n  assignLayer(entity: Entity,\
        \ layer: Layer): void;\n  getActiveLayer(): Layer;\n  setActiveLayer(layer: Layer): void;\n  getLayers(): Layer[];\n\
        \n  // Scene Pages\n  createPage(name: string): ScenePage;\n  deletePage(page: ScenePage): void;\n  activatePage(page:\
        \ ScenePage): void;\n  getPages(): ScenePage[];\n\n  // Events\n  on(event: 'entity-added' | 'entity-removed' | 'entity-changed'\
        \ | 'layer-changed' | 'context-changed', handler: (data: any) => void): void;\n  off(event: string, handler: Function):\
        \ void;\n}\n```\n\n## Editing Context\nWhen the user double-clicks a group/component, we \"enter\" it — only its entities\
        \ are editable, everything else renders semi-transparent. The context stack allows nested group editing. Exiting pops\
        \ the stack."
  uuid: A2js2ESA
- id: data.selection
  kind: selection
  layer: data
  name: Selection Manager
  x:
    selection:
      mode: object
      multi: true
    impl:
      language: TypeScript
      complexity: moderate
      status: implemented
    docs:
      description: Manages current selection state. Supports selection of vertices, edges, faces, groups, component instances.
      notes: "## Typed Interface\n\n```typescript\nimport { Entity, EntityType } from '../data/scene';\nimport { Vertex, Edge,\
        \ Face } from '../geometry/mesh';\nimport { Rect2D } from '../math/types';\n\nexport type SelectableEntity = Vertex\
        \ | Edge | Face | Entity;\n\nexport type SelectionMode = 'object' | 'face' | 'edge' | 'vertex';\n\nexport interface\
        \ SelectionState {\n  mode: SelectionMode;\n  entities: Set<string>; // selected entity IDs\n  preselection: string\
        \ | null; // hovered entity ID (for highlight)\n}\n\nexport interface SelectionChangeEvent {\n  added: SelectableEntity[];\n\
        \  removed: SelectableEntity[];\n  mode: SelectionMode;\n  source: 'click' | 'box' | 'api' | 'outliner';\n}\n\nexport\
        \ interface ISelectionManager {\n  // State\n  readonly state: Readonly<SelectionState>;\n  readonly isEmpty: boolean;\n\
        \  readonly count: number;\n\n  // Selection operations\n  select(entity: SelectableEntity): void; // replace selection\n\
        \  add(entity: SelectableEntity): void; // add to selection\n  remove(entity: SelectableEntity): void; // remove from\
        \ selection\n  toggle(entity: SelectableEntity): void; // toggle in/out\n  selectAll(): void; // select all in current\
        \ editing context\n  clear(): void;\n  selectConnected(entity: SelectableEntity): void; // select all connected geometry\n\
        \n  // Box selection\n  selectInBox(rect: Rect2D, mode: 'window' | 'crossing'): void;\n\n  // Queries\n  isSelected(entity:\
        \ SelectableEntity): boolean;\n  getSelected(): SelectableEntity[];\n  getSelectedByType<T extends SelectableEntity>(type:\
        \ EntityType): T[];\n  getSelectedFaces(): Face[];\n  getSelectedEdges(): Edge[];\n  getSelectedVertices(): Vertex[];\n\
