# Extract SketchUp Windows SDK DLLs using a Windows runner.
# Does a real silent install, then copies the SDK DLLs.
# Run manually via: gh workflow run extract-sdk.yml

name: Extract SketchUp SDK

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Download SketchUp Installer
        run: |
          Write-Host "Downloading SketchUp 2026 installer..."
          Invoke-WebRequest -Uri "https://download.sketchup.com/SketchUpFull-2026-1-256-82.exe" -OutFile "$env:TEMP\SketchUp.exe"
          Write-Host "Download complete: $((Get-Item "$env:TEMP\SketchUp.exe").Length / 1MB) MB"

      - name: Install SketchUp silently
        timeout-minutes: 30
        run: |
          Write-Host "Installing SketchUp 2026 silently..."
          # SketchUp InstallShield Suite supports /silent flag
          $proc = Start-Process -FilePath "$env:TEMP\SketchUp.exe" `
            -ArgumentList '/silent' `
            -Wait -NoNewWindow -PassThru
          Write-Host "Install exit code: $($proc.ExitCode)"

      - name: Collect SDK DLLs
        run: |
          Write-Host "Searching for SketchUpAPI.dll..."

          $apiDll = $null
          $searchPaths = @(
            "C:\Program Files\SketchUp",
            "C:\Program Files (x86)\SketchUp"
          )

          foreach ($path in $searchPaths) {
            if (Test-Path $path) {
              $found = Get-ChildItem $path -Recurse -Filter "SketchUpAPI.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($found) {
                $apiDll = $found
                Write-Host "Found: $($found.FullName)"
                break
              }
            }
          }

          if (-not $apiDll) {
            Write-Host "Not in Program Files. Searching C:\ broadly..."
            $apiDll = Get-ChildItem "C:\" -Recurse -Filter "SketchUpAPI.dll" -ErrorAction SilentlyContinue -Depth 6 | Select-Object -First 1
            if ($apiDll) { Write-Host "Found: $($apiDll.FullName)" }
          }

          if (-not $apiDll) {
            Write-Host "ERROR: SketchUpAPI.dll not found anywhere"
            Write-Host "`nSketchUp-related files:"
            Get-ChildItem "C:\Program Files" -Recurse -ErrorAction SilentlyContinue -Depth 4 |
              Where-Object { $_.Name -match "SketchUp" } |
              Select-Object -First 30 |
              ForEach-Object { Write-Host "  $($_.FullName)" }
            exit 1
          }

          $sdkDir = $apiDll.DirectoryName
          Write-Host "SDK directory: $sdkDir"
          New-Item -ItemType Directory -Force -Path "sdk"

          Get-ChildItem $sdkDir -Filter "*.dll" | ForEach-Object {
            Write-Host "Copying: $($_.Name) ($($_.Length) bytes)"
            Copy-Item $_.FullName "sdk\"
          }

          Write-Host "`nSDK DLLs collected:"
          Get-ChildItem "sdk" | Format-Table Name, Length

      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sketchup-sdk-win64
          path: sdk/
          retention-days: 30
