# Extract SketchUp Windows SDK DLLs using a Windows runner.
# Uses msiexec to extract MSI contents without full installation.
# Run manually via: gh workflow run extract-sdk.yml

name: Extract SketchUp SDK

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Download SketchUp Installer
        run: |
          Write-Host "Downloading SketchUp 2026 installer (1.96 GB)..."
          Invoke-WebRequest -Uri "https://download.sketchup.com/SketchUpFull-2026-1-256-82.exe" -OutFile "$env:TEMP\SketchUp.exe"
          Write-Host "Download complete."

      - name: Extract installer contents
        run: |
          # Run the installer with extraction-only flags
          # InstallShield: /extract_all extracts MSI packages without installing
          Write-Host "Extracting installer contents..."
          $extractDir = "$env:TEMP\su-extract"
          New-Item -ItemType Directory -Force -Path $extractDir

          # Try extraction mode first
          $proc = Start-Process -FilePath "$env:TEMP\SketchUp.exe" `
            -ArgumentList "/extract_all:$extractDir" `
            -Wait -NoNewWindow -PassThru
          Write-Host "Extract exit code: $($proc.ExitCode)"

          # List what we got
          Write-Host "Extracted files:"
          Get-ChildItem $extractDir -Recurse -File | ForEach-Object {
            Write-Host "  $($_.FullName) ($($_.Length) bytes)"
          }

          # If extract didn't work, try running with /a (admin install = extract MSI)
          if (-not (Get-ChildItem $extractDir -Recurse -File -Filter "*.msi" -ErrorAction SilentlyContinue)) {
            Write-Host "No MSI found via extract_all, trying /a install..."
            $adminDir = "$env:TEMP\su-admin"
            New-Item -ItemType Directory -Force -Path $adminDir

            # Search for MSI in temp dirs that the installer may have extracted
            $msiFiles = Get-ChildItem "$env:TEMP" -Recurse -Filter "*.msi" -ErrorAction SilentlyContinue
            Write-Host "Found MSI files in temp:"
            $msiFiles | ForEach-Object { Write-Host "  $($_.FullName)" }

            foreach ($msi in $msiFiles) {
              Write-Host "Extracting MSI: $($msi.Name)..."
              Start-Process msiexec -ArgumentList "/a", "`"$($msi.FullName)`"", "/qn", "TARGETDIR=`"$adminDir\$($msi.BaseName)`"" -Wait -NoNewWindow
            }

            $extractDir = $adminDir
          }

      - name: Find and collect SDK DLLs
        run: |
          Write-Host "Searching for SketchUpAPI.dll..."

          # Search in multiple locations
          $searchPaths = @(
            "$env:TEMP\su-extract",
            "$env:TEMP\su-admin",
            "C:\Program Files\SketchUp",
            "C:\Program Files (x86)\SketchUp",
            "$env:TEMP"
          )

          $apiDll = $null
          foreach ($path in $searchPaths) {
            if (Test-Path $path) {
              $found = Get-ChildItem $path -Recurse -Filter "SketchUpAPI.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($found) {
                $apiDll = $found
                Write-Host "Found SketchUpAPI.dll at: $($found.FullName)"
                break
              }
            }
          }

          if (-not $apiDll) {
            Write-Host "ERROR: SketchUpAPI.dll not found!"
            # List all DLLs we can find for debugging
            foreach ($path in $searchPaths) {
              if (Test-Path $path) {
                Write-Host "`nDLLs in ${path}:"
                Get-ChildItem $path -Recurse -Filter "*.dll" -ErrorAction SilentlyContinue | Select-Object -First 50 | ForEach-Object {
                  Write-Host "  $($_.FullName)"
                }
              }
            }
            exit 1
          }

          $sdkDir = $apiDll.DirectoryName
          Write-Host "SDK directory: $sdkDir"

          New-Item -ItemType Directory -Force -Path "sdk"

          # Copy all DLLs from the same directory as SketchUpAPI.dll
          Get-ChildItem $sdkDir -Filter "*.dll" | ForEach-Object {
            Write-Host "Copying: $($_.Name) ($($_.Length) bytes)"
            Copy-Item $_.FullName "sdk\"
          }

          Write-Host "`nSDK DLLs collected:"
          Get-ChildItem "sdk" | Format-Table Name, Length

      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sketchup-sdk-win64
          path: sdk/
          retention-days: 30
